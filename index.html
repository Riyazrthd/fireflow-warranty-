<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireFlow - Technical Warranty Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal-animate { animation: zoomIn 0.2s ease-out; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(99,102,241,0.4); } 70% { box-shadow: 0 0 0 10px rgba(99,102,241,0); } 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); } }
        .fade-up { animation: fadeUp 0.35s ease both; }
        .slide-in-right { animation: slideInRight 0.3s ease both; }
        * { scrollbar-width: thin; scrollbar-color: #94a3b8 #f1f5f9; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        textarea { overflow-y: auto !important; }
        select.scroll-select { max-height: 12rem; overflow-y: auto; }
        .tl-step { position: relative; padding-left: 2rem; }
        .tl-step::before { content: ''; position: absolute; left: 10px; top: 24px; bottom: -8px; width: 2px; background: #e2e8f0; }
        .tl-step:last-child::before { display: none; }
        .tl-dot { position: absolute; left: 0; top: 14px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; border: 2px solid; }
        .star-btn { background: none; border: none; cursor: pointer; transition: transform 0.1s; }
        .star-btn:hover { transform: scale(1.2); }
        .faq-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease; }
        .faq-body.open { max-height: 500px; }
        .portal-glow { box-shadow: 0 0 0 3px rgba(99,102,241,0.15), 0 4px 24px rgba(99,102,241,0.08); }
        .cust-tab-active { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
        .cust-tab-inactive { background: white; color: #64748b; border: 1px solid #e2e8f0; }
        .status-badge-active { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .status-badge-expiring { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .status-badge-expired { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        const SUPABASE_URL = 'https://zlyvxfkykpjacezfcqum.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_N2uPN5ERE3K1rTgsB0_j4g_YjRyncjN';
        window.SupabaseClient = null;
        try { window.SupabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY); } catch (err) { console.error("Supabase init error:", err); }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;
        const { ResponsiveContainer, ComposedChart, Bar, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend } = window.Recharts || {};

        const DEFAULT_CATEGORIES = [
            "Chassis/Engine Issue","Water Pump/Pump System","PTO/Driveline",
            "Electrical/Siren/Lights","Body Work/Locker/Tank","Foam System/Proportioner","Monitor/Nozzles"
        ];

        const FAQ_DATA = [
            { q: "Water pump not building pressure", a: "Check the priming valve — open it fully before engaging the pump. Verify the suction strainer is clear of debris. Inspect the impeller seal for wear. Ensure PTO is fully engaged before pump operation. If pressure still drops, check for air leaks in suction hose connections." },
            { q: "PTO not engaging properly", a: "Ensure the vehicle is in neutral and engine RPM is at idle (below 800 RPM) before engaging. Check the PTO control cable for slack or binding. Inspect the PTO shift collar for wear. Verify hydraulic pressure if hydraulically actuated. Allow gear oil to warm up in cold weather." },
            { q: "Siren / lights not working", a: "Check the main fuse box — the siren typically uses a 30A or 40A fuse. Test battery voltage (should be 12.6V+). Inspect the siren controller wiring harness for corrosion. Verify the chassis ground strap is tight. For lightbar issues, check the dimmer switch and connector pins." },
            { q: "Foam proportioner not mixing correctly", a: "Verify foam concentrate level in tank. Check the proportioner valve setting (typically 3% or 6%). Inspect the foam induction tube for blockage. Flush the system with clean water after every use. Calibrate using the flow meter if available." },
            { q: "How do I check warranty status?", a: "Use the 'Warranty Lookup' tab above, enter your PO Number or Pump Serial Number, and your warranty status will be displayed instantly including the exact expiry date and remaining days." },
            { q: "How do I log a complaint?", a: "After performing a warranty lookup and finding your vehicle, click 'Log a Complaint' to submit a ticket directly. You will receive a unique Ticket ID — save it to track your complaint's progress." },
        ];

        // ── Map utils ──
        const isMissingColumnError = err => {
            if (!err) return false;
            const msg = (err.message || '').toLowerCase();
            const code = err.code || '';
            return code === '42703' || msg.includes('column') || msg.includes('does not exist') || msg.includes('schema cache') || msg.includes('not found');
        };
        const mapCustomer = r => ({ id: r.id, name: r.name, address: r.address, contactPerson: r.contact_person, phone: r.phone, email: r.email, timestamp: r.created_at });
        const mapTruck = r => ({ id: r.id, customerId: r.customer_id, poNo: r.po_no, tenderType: r.tender_type, pumpMake: r.pump_make, pumpLpm: r.pump_lpm, pumpSrNo: r.pump_sr_no, foamCapacity: r.foam_capacity, waterCapacity: r.water_capacity, chassisMake: r.chassis_make, modelNo: r.model_no, deliveryDate: r.delivery_date, warrantyMonths: r.warranty_months, insurancePolicyNo: r.insurance_policy_no, insuranceCompany: r.insurance_company, insuranceExpiryDate: r.insurance_expiry_date, timestamp: r.created_at });
        const mapComplaint = r => {
            const isResolved = r.status === 'Resolved';
            const closedByVal = (r.closed_by && r.closed_by !== 'N/A') ? r.closed_by : 'Service Engineer';
            const closedDateVal = (r.closed_date && r.closed_date !== 'N/A') ? r.closed_date : ((r.resolved_at ? r.resolved_at.split('T')[0] : null) || r.date_received || new Date().toISOString().split('T')[0]);
            return {
                id: r.id,
                truckId: r.truck_id,
                complaintId: r.complaint_id,
                category: r.category,
                description: r.description,
                dateReceived: r.date_received,
                mode: r.mode,
                reportedBy: r.reported_by,
                status: r.status,
                diagnosis: r.diagnosis,
                closedBy: isResolved ? closedByVal : r.closed_by,
                closedDate: isResolved ? closedDateVal : r.closed_date,
                remarks: r.remarks,
                resolvedAt: r.resolved_at,
                delayReason: r.delay_reason,
                timestamp: r.created_at
            };
        };
        const mapFeedback = r => ({ id: r.id, customerId: r.customer_id, feedbackText: r.feedback_text, feedbackDate: r.feedback_date, personName: r.person_name, contactNumber: r.contact_number, mode: r.mode, rating: r.rating || 5, timestamp: r.created_at });

        // ── Date helpers ──
        const calculateDaysRemaining = expiry => { if (!expiry) return 0; const e = new Date(expiry); e.setHours(23,59,59,999); return Math.ceil((e - new Date()) / 86400000); };
        const calculateWarrantyExpiry = (deliveryDate, months) => { if (!deliveryDate) return null; const d = new Date(deliveryDate); d.setMonth(d.getMonth() + parseInt(months || 0)); return d.toISOString().split('T')[0]; };
        const calculateLifeCount = dateReceived => { if (!dateReceived) return 0; return Math.ceil(Math.abs(new Date() - new Date(dateReceived)) / 86400000); };
        const formatDate = s => s ? new Date(s).toLocaleDateString('en-GB', { year: 'numeric', month: 'short', day: 'numeric' }) : 'N/A';

        // ── Core UI components ──
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const Badge = ({ children, color = 'blue' }) => {
            const colors = { blue:'bg-blue-100 text-blue-800 border-blue-200', green:'bg-emerald-100 text-emerald-800 border-emerald-200', red:'bg-rose-100 text-rose-800 border-rose-200', yellow:'bg-amber-100 text-amber-800 border-amber-200', gray:'bg-slate-100 text-slate-800 border-slate-200', indigo:'bg-indigo-100 text-indigo-800 border-indigo-200', purple:'bg-purple-100 text-purple-800 border-purple-200' };
            return <span className={`px-2 py-0.5 rounded-full text-[10px] font-bold border uppercase tracking-wider ${colors[color]||colors.blue}`}>{children}</span>;
        };

        const Input = ({ label, value, onChange, type="text", placeholder="", required=false, disabled=false }) => (
            <div className="space-y-1">
                <label className="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">{label}</label>
                <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} required={required} disabled={disabled}
                    className="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder:text-slate-300 disabled:bg-slate-50 disabled:text-slate-400" />
            </div>
        );

        const Modal = ({ title, children, onClose, maxW = "max-w-2xl" }) => (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                <div className={`bg-white rounded-2xl shadow-2xl w-full ${maxW} max-h-[90vh] overflow-hidden modal-animate flex flex-col border border-slate-200`}>
                    <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                        <h3 className="font-black text-slate-900 uppercase tracking-tight">{title}</h3>
                        <button onClick={onClose} className="text-slate-400 hover:text-slate-900 text-2xl font-light focus:outline-none">&times;</button>
                    </div>
                    <div className="p-6 overflow-y-auto flex-1 min-h-0">{children}</div>
                </div>
            </div>
        );

        const SearchableSelect = ({ label, options, value, onChange, getOptionLabel, getOptionValue, placeholder="Type to search...", disabled=false, required=false }) => {
            const [open, setOpen] = useState(false);
            const [search, setSearch] = useState('');
            const containerRef = useRef(null);
            const selected = options.find(o => getOptionValue(o) === value);
            const displayLabel = selected ? getOptionLabel(selected) : '';
            const filtered = options.filter(o => getOptionLabel(o).toLowerCase().includes(search.toLowerCase()));
            useEffect(() => {
                const handle = e => { if (containerRef.current && !containerRef.current.contains(e.target)) { setOpen(false); setSearch(''); } };
                document.addEventListener('mousedown', handle);
                return () => document.removeEventListener('mousedown', handle);
            }, []);
            return (
                <div className="space-y-1 relative flex-1 min-w-0" ref={containerRef}>
                    <label className="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">{label}</label>
                    <div className="relative">
                        <input type="text" value={open ? search : displayLabel} onChange={e => { setSearch(e.target.value); if (!open) setOpen(true); }} onFocus={() => { setOpen(true); setSearch(''); }} placeholder={selected ? displayLabel : placeholder} disabled={disabled}
                            className="w-full border border-slate-200 rounded-xl p-3 text-sm bg-white outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-400" />
                        <input tabIndex={-1} value={value || ''} onChange={() => {}} required={required} style={{ opacity: 0, width: 0, height: 0, position: 'absolute', bottom: 0, left: '50%', pointerEvents: 'none' }} />
                    </div>
                    {open && (
                        <div className="absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl max-h-48 overflow-y-auto scroll-select">
                            {filtered.length === 0 ? <div className="p-3 text-sm text-slate-400">No matches</div> : filtered.map((opt, i) => (
                                <button key={i} type="button" onClick={() => { onChange(getOptionValue(opt)); setOpen(false); setSearch(''); }}
                                    className="w-full text-left px-4 py-3 text-sm font-bold hover:bg-indigo-50 border-b border-slate-50 last:border-0 transition-colors">{getOptionLabel(opt)}</button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const AnalyticsTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) return (
                <div className="bg-white/95 backdrop-blur-md p-4 rounded-2xl shadow-2xl border border-slate-100 outline-none">
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 border-b pb-1">{label}</p>
                    <div className="space-y-1.5">{payload.map((entry, i) => (
                        <div key={i} className="flex items-center justify-between gap-6">
                            <div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full" style={{backgroundColor: entry.payload.fill||entry.color}}></div><span className="text-[11px] font-bold text-slate-600 uppercase">{entry.name}:</span></div>
                            <span className="text-xs font-black text-slate-900">{entry.value}</span>
                        </div>
                    ))}</div>
                </div>
            );
            return null;
        };

        // ── Charts ──
        const ComplaintTrendChart = ({ complaints = [], range = 6 }) => {
            const data = useMemo(() => {
                const now = new Date(); const map = {};
                for (let i = 0; i < range; i++) { const d = new Date(now.getFullYear(), now.getMonth()-i, 1); const k = d.toISOString().slice(0,7); map[k] = { month: k, display: d.toLocaleDateString('en-GB',{month:'short',year:'2-digit'}), received: 0, closed: 0 }; }
                complaints.forEach(c => { const rm = c.dateReceived?.slice(0,7); const cm = c.closedDate?.slice(0,7); if (map[rm]) map[rm].received++; if (c.status==='Resolved' && map[cm]) map[cm].closed++; });
                return Object.values(map).sort((a,b) => a.month.localeCompare(b.month)).map(x => ({...x, trend: parseFloat(((x.received+x.closed)/2).toFixed(1))}));
            }, [complaints, range]);
            return (
                <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex flex-col h-[300px]">
                    <div className="flex items-center gap-3 mb-4">
                        <div className="w-9 h-9 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600"><Icon name="trending-up" size={18}/></div>
                        <div><h3 className="font-black text-slate-900 text-sm uppercase tracking-tight">Support Volume</h3><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mt-0.5">Activity Index</p></div>
                    </div>
                    <div className="flex-1 min-h-0">
                        <ResponsiveContainer width="100%" height="100%">
                            <ComposedChart data={data} margin={{top:5,right:5,left:-25,bottom:0}}>
                                <defs>
                                    <linearGradient id="tR" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#fb7185" stopOpacity={0.8}/><stop offset="95%" stopColor="#fb7185" stopOpacity={0.1}/></linearGradient>
                                    <linearGradient id="tC" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#10b981" stopOpacity={0.8}/><stop offset="95%" stopColor="#10b981" stopOpacity={0.1}/></linearGradient>
                                </defs>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
                                <XAxis dataKey="display" axisLine={false} tickLine={false} tick={{fontSize:9,fontWeight:800,fill:'#94a3b8'}} dy={10}/>
                                <YAxis axisLine={false} tickLine={false} tick={{fontSize:9,fontWeight:800,fill:'#94a3b8'}}/>
                                <Tooltip cursor={{fill:'#f8fafc',radius:10}} content={<AnalyticsTooltip/>}/>
                                <Legend verticalAlign="top" align="right" iconType="circle" wrapperStyle={{paddingBottom:'15px',fontSize:'9px',fontWeight:'900',textTransform:'uppercase'}}/>
                                <Bar name="Open" dataKey="received" fill="url(#tR)" radius={[6,6,0,0]} barSize={10}/>
                                <Bar name="Closed" dataKey="closed" fill="url(#tC)" radius={[6,6,0,0]} barSize={10}/>
                                <Line name="Avg" type="monotone" dataKey="trend" stroke="#6366f1" strokeWidth={3} dot={{r:3,fill:'#fff',stroke:'#6366f1',strokeWidth:2}} animationDuration={1500}/>
                            </ComposedChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );
        };

        const ComplaintCategoryChart = ({ complaints = [], range = 6 }) => {
            const data = useMemo(() => {
                const now = new Date(); const limit = new Date(now.getFullYear(), now.getMonth()-range, 1); const counts = {};
                complaints.forEach(c => { if (new Date(c.dateReceived) >= limit) counts[c.category] = (counts[c.category]||0)+1; });
                return Object.entries(counts).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
            }, [complaints, range]);
            return (
                <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex flex-col h-[300px]">
                    <div className="flex items-center gap-3 mb-4">
                        <div className="w-9 h-9 bg-amber-50 rounded-xl flex items-center justify-center text-amber-600"><Icon name="pie-chart" size={18}/></div>
                        <div><h3 className="font-black text-slate-900 text-sm uppercase tracking-tight">Category Distribution</h3><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mt-0.5">Issue Hotspots</p></div>
                    </div>
                    <div className="flex-1 min-h-0">
                        {data.length > 0 ? (
                            <ResponsiveContainer width="100%" height="100%">
                                <ComposedChart data={data} layout="vertical" margin={{top:0,right:30,left:45,bottom:0}}>
                                    <defs><linearGradient id="cG" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#f59e0b" stopOpacity={0.1}/><stop offset="100%" stopColor="#f59e0b" stopOpacity={0.9}/></linearGradient></defs>
                                    <XAxis type="number" hide/>
                                    <YAxis type="category" dataKey="name" axisLine={false} tickLine={false} width={110} tick={{fontSize:8,fontWeight:800,fill:'#64748b',textTransform:'uppercase'}}/>
                                    <Tooltip cursor={{fill:'#fffbeb',radius:10}} content={<AnalyticsTooltip/>}/>
                                    <Bar name="Count" dataKey="value" fill="url(#cG)" radius={[0,6,6,0]} barSize={12}/>
                                </ComposedChart>
                            </ResponsiveContainer>
                        ) : <div className="h-full flex flex-col items-center justify-center opacity-30 text-[10px] font-black uppercase tracking-widest gap-2"><Icon name="database" size={24}/><span>No Data</span></div>}
                    </div>
                </div>
            );
        };

        // ── Star Rating ──
        const StarRating = ({ value, onChange }) => (
            <div className="flex gap-1">
                {[1,2,3,4,5].map(n => (
                    <button key={n} type="button" className="star-btn" onClick={()=>onChange(n)}>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill={n<=value?"#f59e0b":"none"} stroke={n<=value?"#f59e0b":"#d1d5db"} strokeWidth="2">
                            <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
                        </svg>
                    </button>
                ))}
            </div>
        );

        // ── FAQ Accordion ──
        const FaqItem = ({ item }) => {
            const [open, setOpen] = useState(false);
            return (
                <div className="border border-slate-200 rounded-2xl overflow-hidden mb-3">
                    <button onClick={()=>setOpen(!open)} className="w-full flex items-center justify-between px-5 py-4 bg-white hover:bg-slate-50 text-left transition-colors">
                        <span className="text-sm font-black text-slate-800 uppercase tracking-tight pr-4">{item.q}</span>
                        <div className={`w-6 h-6 rounded-full bg-indigo-100 flex items-center justify-center flex-shrink-0 transition-transform ${open?'rotate-180':''}`}>
                            <Icon name="chevron-down" size={14} className="text-indigo-600"/>
                        </div>
                    </button>
                    <div className={`faq-body ${open?'open':''}`}>
                        <p className="px-5 py-4 text-sm text-slate-600 leading-relaxed bg-slate-50 border-t border-slate-100">{item.a}</p>
                    </div>
                </div>
            );
        };

        // ── Ticket Timeline ──
        const TicketTimeline = ({ complaint, trucks, customers }) => {
            if (!complaint) return null;
            const trk = trucks.find(t=>t.id===complaint.truckId);
            const cust = customers.find(c=>c.id===trk?.customerId);
            const warrantyExp = calculateWarrantyExpiry(trk?.deliveryDate, trk?.warrantyMonths);
            const dRem = calculateDaysRemaining(warrantyExp);
            const isInWarranty = dRem > 0;

            const trackerClosedBy = (complaint.closedBy && complaint.closedBy !== 'N/A') ? complaint.closedBy : (complaint.status === 'Resolved' ? 'Service Engineer' : null);
            const trackerClosedDate = (complaint.closedDate && complaint.closedDate !== 'N/A') ? complaint.closedDate : (complaint.status === 'Resolved' ? ((complaint.resolvedAt ? complaint.resolvedAt.split('T')[0] : null) || complaint.dateReceived) : null);

            const steps = [
                { label: 'Complaint Logged', sub: `${complaint.mode||'Customer Portal'} · ${formatDate(complaint.dateReceived)}`, done: true, active: false, icon: 'file-text', color: 'indigo' },
                { label: 'Under Review', sub: (complaint.status!=='Open' || !!trackerClosedBy) ? 'Being reviewed by engineering team' : 'Awaiting assignment', done: complaint.status!=='Open' || !!trackerClosedBy, active: complaint.status==='Open' && !trackerClosedBy, icon: 'search', color: 'blue' },
                { label: 'Engineer Assigned', sub: trackerClosedBy ? (complaint.status === 'Resolved' ? `Assigned to: ${trackerClosedBy}` : `Assigned to: ${trackerClosedBy} (Scheduled Visit: ${formatDate(trackerClosedDate)})${complaint.delayReason ? ` · ⚠️ Rescheduled: ${complaint.delayReason}` : ''}`) : 'Pending assignment', done: !!trackerClosedBy, active: false, icon: 'user-check', color: 'amber' },
                { label: 'Case Resolved', sub: complaint.status==='Resolved' ? `Closed on ${formatDate(trackerClosedDate)} · ${complaint.diagnosis||''}` : (complaint.delayReason ? `Awaiting service visit (Delayed: ${complaint.delayReason})` : (trackerClosedBy ? 'Awaiting service visit & diagnosis' : 'Pending resolution')), done: complaint.status==='Resolved', active: complaint.status==='Open' && !!trackerClosedBy, icon: 'check-circle', color: 'emerald' },
            ];

            const colorMap = { indigo:'border-indigo-400 bg-indigo-50 text-indigo-600', blue:'border-blue-400 bg-blue-50 text-blue-600', amber:'border-amber-400 bg-amber-50 text-amber-600', emerald:'border-emerald-400 bg-emerald-50 text-emerald-600' };
            const doneColorMap = { indigo:'border-indigo-600 bg-indigo-600 text-white', blue:'border-blue-600 bg-blue-600 text-white', amber:'border-amber-600 bg-amber-600 text-white', emerald:'border-emerald-600 bg-emerald-600 text-white' };

            return (
                <div className="space-y-4">
                    <div className="bg-gradient-to-r from-indigo-50 to-purple-50 rounded-2xl p-5 border border-indigo-100">
                        <div className="flex items-start justify-between gap-4 flex-wrap">
                            <div>
                                <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-1">Ticket ID</p>
                                <p className="text-2xl font-black text-indigo-900 tracking-tight">{complaint.complaintId}</p>
                                <p className="text-[11px] font-bold text-slate-500 mt-1">{complaint.category} · {cust?.name||'Unknown Client'}</p>
                            </div>
                            <div className="text-right">
                                <Badge color={complaint.status==='Resolved'?'green':'red'}>{complaint.status}</Badge>
                                {trk && <p className="text-[10px] font-bold text-slate-400 mt-2">PO: {trk.poNo} · {trk.tenderType}</p>}
                                <p className={`text-[10px] font-black mt-1 ${isInWarranty?'text-emerald-600':'text-rose-600'}`}>{isInWarranty?`Warranty: ${dRem}d remaining`:'Warranty Expired'}</p>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl p-5 border border-slate-200">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Resolution Progress</p>
                        <div className="space-y-0">
                            {steps.map((step, i) => (
                                <div key={i} className="tl-step pb-6">
                                    <div className={`tl-dot ${step.done ? doneColorMap[step.color] : (step.active ? colorMap[step.color]+' animate-pulse' : 'border-slate-200 bg-slate-50 text-slate-300')}`}>
                                        {step.done ? <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg> : <span>{i+1}</span>}
                                    </div>
                                    <div className="pl-2">
                                        <p className={`text-sm font-black ${step.done?'text-slate-900':(step.active?'text-indigo-700':'text-slate-400')}`}>{step.label}</p>
                                        <p className="text-[10px] font-bold text-slate-400 mt-0.5">{step.sub}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                        {complaint.description && (
                            <div className="mt-2 p-4 bg-slate-50 rounded-xl border border-slate-100">
                                <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Complaint Description</p>
                                <p className="text-[12px] font-bold text-slate-700">{complaint.description}</p>
                            </div>
                        )}
                        {complaint.remarks && (
                            <div className="mt-3 p-4 bg-emerald-50 rounded-xl border border-emerald-100">
                                <p className="text-[9px] font-black text-emerald-500 uppercase mb-1">Engineer Notes</p>
                                <p className="text-[12px] font-bold text-emerald-800">{complaint.remarks}</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ── Customer Portal ──
        const CustomerPortal = ({ trucks, customers, complaints, categories, setComplaints, feedbacks, setFeedbacks, user, initialPo = '', getQrImageUrl }) => {
            const [tab, setTab] = useState('lookup');
            const [lookupQuery, setLookupQuery] = useState(initialPo);
            const [foundTruck, setFoundTruck] = useState(null);
            const [lookupError, setLookupError] = useState('');
            const [showComplaintForm, setShowComplaintForm] = useState(false);
            const [ticketQuery, setTicketQuery] = useState('');
            const [foundTicket, setFoundTicket] = useState(null);
            const [ticketError, setTicketError] = useState('');
            const [compForm, setCompForm] = useState({ category:'', description:'', reportedBy:'', contactPhone:'', contactEmail:'' });
            const [compSubmitted, setCompSubmitted] = useState(null);
            const [fbForm, setFbForm] = useState({ rating: 5, feedbackText:'', personName:'', contactNumber:'' });
            const [fbSubmitted, setFbSubmitted] = useState(false);

            // Auto-trigger lookup if initialPo provided (from QR scan)
            useEffect(() => {
                if (initialPo) {
                    setLookupQuery(initialPo);
                    if (trucks.length > 0) {
                        const q = initialPo.trim().toUpperCase();
                        const found = trucks.find(t => (t.poNo||'').trim().toUpperCase() === q || (t.pumpSrNo||'').trim().toUpperCase() === q);
                        if (found) {
                            setFoundTruck(found);
                            setLookupError('');
                        } else {
                            setLookupError('Vehicle not found for scanned QR. Please check with your service team.');
                        }
                    }
                }
            }, [initialPo, trucks]);

            const handleLookup = () => {
                setLookupError(''); setFoundTruck(null); setShowComplaintForm(false); setCompSubmitted(null);
                const q = lookupQuery.trim().toUpperCase();
                if (!q) { setLookupError('Please enter a PO Number or Pump Serial No.'); return; }
                const found = trucks.find(t => (t.poNo||'').trim().toUpperCase() === q || (t.pumpSrNo||'').trim().toUpperCase() === q);
                if (found) { setFoundTruck(found); } else { setLookupError('No vehicle found with that PO or Serial No. Please check and try again.'); }
            };

            const handleTicketLookup = () => {
                setTicketError(''); setFoundTicket(null); setFbSubmitted(false);
                const q = ticketQuery.trim().toUpperCase();
                if (!q) { setTicketError('Please enter your Ticket ID.'); return; }
                const found = complaints.find(c => (c.complaintId||'').toUpperCase() === q);
                if (found) { setFoundTicket(found); } else { setTicketError('Ticket not found. Please check the ID and try again.'); }
            };

            const handleSubmitComplaint = async e => {
                e.preventDefault();
                if (!foundTruck) return;
                const warrantyExp = calculateWarrantyExpiry(foundTruck.deliveryDate, foundTruck.warrantyMonths);
                const dRemaining = calculateDaysRemaining(warrantyExp);
                const statusShort = dRemaining > 0 ? 'IW' : 'OW';
                const d = new Date(); const dd = d.getDate().toString().padStart(2,'0'); const mm = (d.getMonth()+1).toString().padStart(2,'0');
                const genId = `${dd}${mm}-${statusShort}-${Math.floor(1000+Math.random()*9000)}`;
                const newComp = { truckId: foundTruck.id, complaintId: genId, category: compForm.category, description: compForm.description, dateReceived: new Date().toISOString().split('T')[0], mode: 'Customer Portal', reportedBy: compForm.reportedBy + (compForm.contactPhone?` (${compForm.contactPhone})`:'') + (compForm.contactEmail?` <${compForm.contactEmail}>`:'' ), status: 'Open' };
                const sb = window.SupabaseClient;
                let saved = { id:'LOCAL-'+Date.now(), ...newComp, timestamp: new Date().toISOString() };
                if (sb && user) {
                    try {
                        const payload = { truck_id: newComp.truckId, complaint_id: newComp.complaintId, category: newComp.category, description: newComp.description, date_received: newComp.dateReceived, mode: newComp.mode, reported_by: newComp.reportedBy, status: 'Open' };
                        const { data: inserted, error } = await sb.from('complaints').insert(payload).select().single();
                        if (!error && inserted) saved = mapComplaint(inserted);
                    } catch(err) {}
                }
                setComplaints(prev => [saved, ...prev]);
                setCompSubmitted(saved);
                setShowComplaintForm(false);
            };

            const handleSubmitFeedback = async e => {
                e.preventDefault();
                if (!foundTicket) return;
                const trk = trucks.find(t=>t.id===foundTicket.truckId);
                if (!trk) return;
                const newFb = { customerId: trk.customerId, feedbackText: fbForm.feedbackText, feedbackDate: new Date().toISOString().split('T')[0], personName: fbForm.personName, contactNumber: fbForm.contactNumber, mode: 'Customer Portal', rating: fbForm.rating };
                const sb = window.SupabaseClient;
                let saved = { id:'LOCAL-'+Date.now(), ...newFb, timestamp: new Date().toISOString() };
                if (sb && user) {
                    try {
                        const payload = { customer_id: newFb.customerId, feedback_text: newFb.feedbackText, feedback_date: newFb.feedbackDate, person_name: newFb.personName, contact_number: newFb.contactNumber, mode: newFb.mode, rating: newFb.rating };
                        const { data: inserted, error } = await sb.from('feedbacks').insert(payload).select().single();
                        if (!error && inserted) saved = mapFeedback(inserted);
                    } catch(err) {}
                }
                setFeedbacks(prev => [saved, ...prev]);
                setFbSubmitted(true);
            };

            const cust = foundTruck ? customers.find(c=>c.id===foundTruck.customerId) : null;
            const warrantyExp = foundTruck ? calculateWarrantyExpiry(foundTruck.deliveryDate, foundTruck.warrantyMonths) : null;
            const dRem = warrantyExp ? calculateDaysRemaining(warrantyExp) : 0;

            const tabs = [
                { id:'lookup', icon:'search', label:'Warranty Lookup' },
                { id:'tracker', icon:'activity', label:'Track Ticket' },
                { id:'faq', icon:'help-circle', label:'Self-Help FAQ' },
            ];

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-50 via-indigo-50/30 to-purple-50/20 p-4 md:p-8">
                    {/* Portal Header */}
                    <div className="max-w-4xl mx-auto">
                        <div className="text-center mb-8 fade-up">
                            <div className="inline-flex items-center gap-3 bg-white border border-indigo-200 shadow-lg px-5 py-2.5 rounded-full mb-4">
                                <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                                <span className="text-[11px] font-black text-indigo-700 uppercase tracking-widest">Customer Self-Service Portal</span>
                            </div>
                            <h1 className="text-3xl font-black text-slate-900 tracking-tight mb-2">FireFlow Warranty <span className="bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">Support Hub</span></h1>
                            <p className="text-slate-500 text-sm font-bold">Look up warranty status · Log complaints · Track ticket progress · Self-help guides</p>
                        </div>

                        {/* Tab Nav */}
                        <div className="flex gap-2 mb-6 flex-wrap justify-center">
                            {tabs.map(t => (
                                <button key={t.id} onClick={()=>setTab(t.id)} className={`flex items-center gap-2 px-5 py-2.5 rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all shadow-sm ${tab===t.id?'cust-tab-active shadow-indigo-200':'cust-tab-inactive hover:border-indigo-300'}`}>
                                    <Icon name={t.icon} size={14}/>{t.label}
                                </button>
                            ))}
                        </div>

                        {/* ── TAB: LOOKUP ── */}
                        {tab==='lookup' && (
                            <div className="space-y-5 fade-up">
                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 portal-glow">
                                    <h2 className="font-black text-slate-900 uppercase tracking-tight mb-1 flex items-center gap-2"><Icon name="shield-check" size={18} className="text-indigo-600"/> Warranty & Vehicle Lookup</h2>
                                    <p className="text-[11px] text-slate-500 font-bold mb-5">Enter your Purchase Order number or Pump Serial Number to check warranty status.</p>
                                    <div className="flex gap-3">
                                        <input type="text" value={lookupQuery} onChange={e=>setLookupQuery(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLookup()} placeholder="e.g. PO-802 or SR-12345" className="flex-1 border-2 border-slate-200 rounded-2xl px-5 py-3.5 text-sm font-bold outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all placeholder:text-slate-300"/>
                                        <button onClick={handleLookup} className="bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-7 py-3.5 rounded-2xl font-black text-[12px] uppercase tracking-widest shadow-lg hover:shadow-indigo-200 hover:shadow-xl transition-all">Search</button>
                                    </div>
                                    {lookupError && <div className="mt-3 flex items-center gap-2 text-rose-600 text-sm font-bold bg-rose-50 px-4 py-3 rounded-xl border border-rose-100"><Icon name="alert-circle" size={16}/>{lookupError}</div>}
                                </div>

                                {foundTruck && (
                                    <div className="slide-in-right space-y-4">
                                         {/* Vehicle Details Card */}
                                        <div className="bg-white rounded-3xl p-6 shadow-xl border border-slate-100/80 fade-up">
                                            {/* Header Section */}
                                            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-slate-100 pb-5 mb-5">
                                                <div>
                                                    <span className="text-[9px] font-black text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full uppercase tracking-widest">Vehicle Verified</span>
                                                    <h3 className="text-xl font-black text-slate-900 uppercase tracking-tight mt-2">{foundTruck.tenderType}</h3>
                                                    <p className="text-xs font-bold text-slate-500 mt-1 flex items-center gap-1">
                                                        <Icon name="building" size={12}/> {cust?.name||'Client Organization'}
                                                    </p>
                                                </div>
                                                <div className={`px-5 py-3 rounded-2xl text-center sm:text-right ${dRem>60?'status-badge-active':dRem>0?'status-badge-expiring':'status-badge-expired'}`}>
                                                    <p className="text-[8px] font-black uppercase tracking-widest opacity-95">Warranty Coverage</p>
                                                    <p className="text-2xl font-black mt-0.5">{dRem>0?`${dRem} Days`:dRem===0?'Expires Today':'Expired'}</p>
                                                    <p className="text-[9px] font-bold opacity-80 mt-0.5">{dRem>0?'Active Coverage':dRem<0?`Expired ${Math.abs(dRem)} days ago`:''}</p>
                                                </div>
                                            </div>

                                            {/* Info Grid */}
                                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                                {/* Left Column: Tech Specifications */}
                                                <div className="space-y-4 lg:col-span-2">
                                                    <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b pb-1">Technical Specifications</h4>
                                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                                        {[
                                                            ['PO Number', foundTruck.poNo],
                                                            ['Chassis Make', foundTruck.chassisMake],
                                                            ['Model Number', foundTruck.modelNo || 'N/A'],
                                                            ['Pump Make', foundTruck.pumpMake],
                                                            ['Pump Serial', foundTruck.pumpSrNo || 'N/A'],
                                                            ['Pump Capacity', foundTruck.pumpLpm ? `${foundTruck.pumpLpm} LPM` : 'N/A'],
                                                            ['Water Capacity', foundTruck.waterCapacity ? `${foundTruck.waterCapacity} L` : 'N/A'],
                                                            ['Foam Capacity', foundTruck.foamCapacity ? `${foundTruck.foamCapacity} L` : 'N/A'],
                                                            ['Delivery Date', formatDate(foundTruck.deliveryDate)]
                                                        ].map(([l,v],i)=>(
                                                            <div key={i} className="bg-slate-50/50 rounded-xl p-3 border border-slate-100 hover:bg-slate-50 transition-colors">
                                                                <p className="text-[8px] font-black text-slate-400 uppercase tracking-wider mb-1">{l}</p>
                                                                <p className="text-[11px] font-bold text-slate-800 uppercase truncate" title={v}>{v||'—'}</p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>

                                                {/* Right Column: Insurance & QR (Desktop Only) */}
                                                <div className="space-y-4 flex flex-col justify-between">
                                                    <div>
                                                        <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b pb-1">Insurance details</h4>
                                                        <div className="bg-indigo-50/30 rounded-2xl p-4 border border-indigo-100/50 mt-3 space-y-3">
                                                            <div>
                                                                <p className="text-[8px] font-black text-indigo-400 uppercase">Provider Company</p>
                                                                <p className="text-xs font-black text-slate-800 uppercase mt-0.5">{foundTruck.insuranceCompany || 'Not Recorded'}</p>
                                                            </div>
                                                            <div>
                                                                <p className="text-[8px] font-black text-indigo-400 uppercase">Policy Number</p>
                                                                <p className="text-xs font-bold text-slate-700 uppercase mt-0.5">{foundTruck.insurancePolicyNo || 'Not Recorded'}</p>
                                                            </div>
                                                            <div>
                                                                <p className="text-[8px] font-black text-indigo-400 uppercase">Coverage Expiry</p>
                                                                <p className="text-xs font-bold text-slate-700 mt-0.5">{foundTruck.insuranceExpiryDate ? formatDate(foundTruck.insuranceExpiryDate) : 'Not Recorded'}</p>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    {/* QR Code Container (Visible on Desktop, hidden on Mobile) */}
                                                    {getQrImageUrl && (
                                                        <div className="hidden lg:flex flex-col items-center justify-center pt-4 shrink-0">
                                                            <div className="bg-slate-900 rounded-2xl p-3 text-center text-white w-full max-w-[160px] shadow-md">
                                                                <div className="bg-white rounded-lg p-1 inline-block">
                                                                    <img src={getQrImageUrl(foundTruck)} alt="Warranty QR Code" width="100" height="100" className="block" style={{imageRendering:'pixelated'}}/>
                                                                </div>
                                                                <p className="text-[8px] font-bold text-slate-400 mt-1.5 uppercase tracking-wider">Device QR Reference</p>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                            {/* Action / Warranty Expiry Footer */}
                                            <div className="mt-6 pt-5 border-t border-slate-100 flex flex-col sm:flex-row items-center justify-between gap-4">
                                                <div>
                                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Warranty Period Ends</p>
                                                    <p className="font-black text-slate-800 text-sm mt-0.5">{formatDate(warrantyExp)} <span className={`ml-2 text-[9px] px-2 py-0.5 rounded-full font-black ${dRem>60?'bg-emerald-100 text-emerald-700':dRem>0?'bg-amber-100 text-amber-700':'bg-rose-100 text-rose-700'}`}>{dRem>0?'ACTIVE COVERAGE':'EXPIRED'}</span></p>
                                                </div>
                                                <button onClick={()=>setShowComplaintForm(!showComplaintForm)} className="w-full sm:w-auto flex items-center justify-center gap-2 bg-rose-600 text-white px-7 py-3.5 rounded-2xl font-black text-[11px] uppercase tracking-widest hover:bg-rose-700 shadow-lg shadow-rose-200 hover:shadow-xl transition-all">
                                                    <Icon name="message-square-plus" size={16}/>Log a Complaint
                                                </button>
                                            </div>
                                        </div>

                                        {/* Complaint Form */}
                                        {showComplaintForm && (
                                            <div className="slide-in-right bg-white rounded-3xl p-6 shadow-sm border border-rose-200">
                                                <h3 className="font-black text-slate-900 uppercase mb-4 flex items-center gap-2"><Icon name="file-text" size={18} className="text-rose-600"/>Direct Complaint Registration</h3>
                                                <form onSubmit={handleSubmitComplaint} className="space-y-4">
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        <div className="space-y-1">
                                                            <label className="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Category *</label>
                                                            <select value={compForm.category} onChange={e=>setCompForm({...compForm,category:e.target.value})} required className="w-full border border-slate-200 rounded-xl p-3 text-sm bg-white outline-none focus:ring-2 focus:ring-rose-500">
                                                                <option value="">Select Category...</option>
                                                                {categories.map((c,i)=><option key={i} value={c}>{c}</option>)}
                                                            </select>
                                                        </div>
                                                        <Input label="Your Name *" value={compForm.reportedBy} onChange={v=>setCompForm({...compForm,reportedBy:v})} required placeholder="Full name"/>
                                                    </div>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        <Input label="Phone Number" value={compForm.contactPhone} onChange={v=>setCompForm({...compForm,contactPhone:v})} placeholder="+91 98765 43210" type="tel"/>
                                                        <Input label="Email Address" value={compForm.contactEmail} onChange={v=>setCompForm({...compForm,contactEmail:v})} placeholder="your@email.com" type="email"/>
                                                    </div>
                                                    <div className="space-y-1">
                                                        <label className="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Complaint Description *</label>
                                                        <textarea value={compForm.description} onChange={e=>setCompForm({...compForm,description:e.target.value})} required placeholder="Describe the issue in detail — when it started, what you observe, any error codes..." className="w-full border border-slate-200 rounded-xl p-3 text-sm min-h-[120px] outline-none focus:ring-2 focus:ring-rose-500"/>
                                                    </div>
                                                    <div className="flex gap-3">
                                                        <button type="button" onClick={()=>setShowComplaintForm(false)} className="flex-1 py-3 rounded-2xl bg-slate-100 text-slate-600 font-black text-xs uppercase tracking-widest hover:bg-slate-200 transition-all">Cancel</button>
                                                        <button type="submit" className="flex-1 py-3 rounded-2xl bg-rose-600 text-white font-black text-xs uppercase tracking-widest shadow-xl hover:bg-rose-700 transition-all">Submit Complaint</button>
                                                    </div>
                                                </form>
                                            </div>
                                        )}

                                        {/* Success card */}
                                        {compSubmitted && (
                                            <div className="slide-in-right bg-emerald-50 border border-emerald-200 rounded-3xl p-6">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 rounded-2xl bg-emerald-600 flex items-center justify-center flex-shrink-0">
                                                        <Icon name="check-circle" size={24} className="text-white"/>
                                                    </div>
                                                    <div>
                                                        <p className="font-black text-emerald-900 uppercase">Complaint Registered!</p>
                                                        <p className="text-sm font-bold text-emerald-700 mt-0.5">Your Ticket ID: <span className="font-black text-emerald-900 bg-white px-2 py-0.5 rounded-lg border border-emerald-200">{compSubmitted.complaintId}</span></p>
                                                        <p className="text-[11px] font-bold text-emerald-600 mt-1">Save this ID to track your complaint. Use the "Track Ticket" tab above.</p>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ── TAB: TRACKER ── */}
                        {tab==='tracker' && (
                            <div className="space-y-5 fade-up">
                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 portal-glow">
                                    <h2 className="font-black text-slate-900 uppercase tracking-tight mb-1 flex items-center gap-2"><Icon name="activity" size={18} className="text-indigo-600"/>Real-Time Ticket Tracker</h2>
                                    <p className="text-[11px] text-slate-500 font-bold mb-5">Enter your Ticket ID (e.g. 0506-IW-1234) to see real-time status updates.</p>
                                    <div className="flex gap-3">
                                        <input type="text" value={ticketQuery} onChange={e=>setTicketQuery(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleTicketLookup()} placeholder="e.g. 0506-IW-1234" className="flex-1 border-2 border-slate-200 rounded-2xl px-5 py-3.5 text-sm font-bold outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all placeholder:text-slate-300 uppercase"/>
                                        <button onClick={handleTicketLookup} className="bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-7 py-3.5 rounded-2xl font-black text-[12px] uppercase tracking-widest shadow-lg hover:shadow-indigo-200 hover:shadow-xl transition-all">Track</button>
                                    </div>
                                    {ticketError && <div className="mt-3 flex items-center gap-2 text-rose-600 text-sm font-bold bg-rose-50 px-4 py-3 rounded-xl border border-rose-100"><Icon name="alert-circle" size={16}/>{ticketError}</div>}
                                </div>

                                {foundTicket && (
                                    <div className="slide-in-right space-y-4">
                                        <TicketTimeline complaint={foundTicket} trucks={trucks} customers={customers}/>

                                        {/* Feedback Form for resolved tickets */}
                                        {foundTicket.status==='Resolved' && !fbSubmitted && (
                                            <div className="bg-white rounded-3xl p-6 shadow-sm border border-indigo-200">
                                                <h3 className="font-black text-slate-900 uppercase mb-1 flex items-center gap-2"><Icon name="star" size={18} className="text-amber-500"/>Rate Your Experience</h3>
                                                <p className="text-[11px] font-bold text-slate-500 mb-4">Help us improve by sharing feedback on your resolved case.</p>
                                                <form onSubmit={handleSubmitFeedback} className="space-y-4">
                                                    <div className="space-y-1">
                                                        <label className="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Overall Rating *</label>
                                                        <StarRating value={fbForm.rating} onChange={v=>setFbForm({...fbForm,rating:v})}/>
                                                    </div>
                                                    <div className="space-y-1">
                                                        <label className="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Your Feedback *</label>
                                                        <textarea value={fbForm.feedbackText} onChange={e=>setFbForm({...fbForm,feedbackText:e.target.value})} required placeholder="Tell us about your service experience..." className="w-full border border-slate-200 rounded-xl p-3 text-sm min-h-[90px] outline-none focus:ring-2 focus:ring-indigo-500"/>
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <Input label="Your Name *" value={fbForm.personName} onChange={v=>setFbForm({...fbForm,personName:v})} required/>
                                                        <Input label="Contact Number *" value={fbForm.contactNumber} onChange={v=>setFbForm({...fbForm,contactNumber:v})} required/>
                                                    </div>
                                                    <button type="submit" className="w-full py-3.5 rounded-2xl bg-gradient-to-r from-amber-500 to-orange-500 text-white font-black text-xs uppercase tracking-widest shadow-lg hover:shadow-amber-200 transition-all">Submit Feedback</button>
                                                </form>
                                            </div>
                                        )}
                                        {fbSubmitted && (
                                            <div className="bg-amber-50 border border-amber-200 rounded-3xl p-5 flex items-center gap-4">
                                                <div className="w-10 h-10 rounded-xl bg-amber-500 flex items-center justify-center"><Icon name="star" size={20} className="text-white"/></div>
                                                <div><p className="font-black text-amber-900 uppercase">Thank You for Your Feedback!</p><p className="text-[11px] font-bold text-amber-700 mt-0.5">Your review has been recorded and helps us serve you better.</p></div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ── TAB: FAQ ── */}
                        {tab==='faq' && (
                            <div className="fade-up">
                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 mb-5">
                                    <h2 className="font-black text-slate-900 uppercase tracking-tight mb-1 flex items-center gap-2"><Icon name="help-circle" size={18} className="text-indigo-600"/>Self-Service Support Guide</h2>
                                    <p className="text-[11px] text-slate-500 font-bold">Common troubleshooting steps for fire tender systems. Try these before logging a complaint.</p>
                                </div>
                                <div>
                                    {FAQ_DATA.map((item, i) => <FaqItem key={i} item={item}/>)}
                                </div>
                                <div className="mt-5 p-5 bg-gradient-to-r from-indigo-50 to-purple-50 rounded-3xl border border-indigo-100 text-center">
                                    <p className="font-black text-indigo-900 uppercase mb-1">Still need help?</p>
                                    <p className="text-[12px] font-bold text-slate-600 mb-3">Our engineers are ready to assist you with any technical issues.</p>
                                    <button onClick={()=>setTab('lookup')} className="bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-6 py-2.5 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-lg transition-all">Find My Vehicle & Log Complaint</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ══════════════════════════════════════════════════════
        // MAIN APP
        // ══════════════════════════════════════════════════════
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [viewMode, setViewMode] = useState('admin'); // 'admin' | 'customer'
            const [notifications, setNotifications] = useState([]);
            const [analyticsRange, setAnalyticsRange] = useState(6);
            const [expiryDays, setExpiryDays] = useState(30);
            const [syncErrors, setSyncErrors] = useState([]);

            // Filters
            const [compSearch, setCompSearch] = useState('');
            const [compStatus, setCompStatus] = useState('All');
            const [compCat, setCompCat] = useState('All');
            const [compDate, setCompDate] = useState('');

            // Core Data
            const [customers, setCustomers] = useState(() => JSON.parse(localStorage.getItem('ff_cust')||'[]'));
            const [trucks, setTrucks] = useState(() => JSON.parse(localStorage.getItem('ff_trks')||'[]'));
            const [complaints, setComplaints] = useState(() => JSON.parse(localStorage.getItem('ff_cmps')||'[]'));
            const [feedbacks, setFeedbacks] = useState(() => JSON.parse(localStorage.getItem('ff_fb')||'[]'));
            const [categories, setCategories] = useState(() => JSON.parse(localStorage.getItem('ff_cats')||JSON.stringify(DEFAULT_CATEGORIES)));

            // Modals
            const [showCustomerModal, setShowCustomerModal] = useState(false);
            const [showTruckModal, setShowTruckModal] = useState(false);
            const [showComplaintModal, setShowComplaintModal] = useState(false);
            const [showFeedbackModal, setShowFeedbackModal] = useState(null);
            const [showCloseModal, setShowCloseModal] = useState(null);
            const [showAssignModal, setShowAssignModal] = useState(null);
            const [assignData, setAssignData] = useState({ closedBy: '', closedDate: new Date().toISOString().split('T')[0], delayReason: '' });
            const [showCategoryModal, setShowCategoryModal] = useState(false);
            const [showViewComplaintsModal, setShowViewComplaintsModal] = useState(null);
            const [deleteStep, setDeleteStep] = useState(null);
            const [showQrModal, setShowQrModal] = useState(false);
            const [qrTruck, setQrTruck] = useState(null);
            const [portalInitialPo, setPortalInitialPo] = useState('');
            const [showAdminPin, setShowAdminPin] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [pinError, setPinError] = useState(false);
            const ADMIN_PIN = '2410'; // Change this to your preferred PIN
            const [editingCustomer, setEditingCustomer] = useState(null);
            const [editingTruck, setEditingTruck] = useState(null);

            // Form state
            const [newCust, setNewCust] = useState({ name:'', address:'', contactPerson:'', phone:'', email:'' });
            const [newTrk, setNewTrk] = useState({ customerId:'', poNo:'', tenderType:'', pumpMake:'', pumpLpm:'', pumpSrNo:'', foamCapacity:'', waterCapacity:'', chassisMake:'', modelNo:'', deliveryDate:'', warrantyMonths:12, insurancePolicyNo:'', insuranceCompany:'', insuranceExpiryDate:'' });
            const [newCat, setNewCat] = useState('');
            const [newFb, setNewFb] = useState({ feedbackText:'', feedbackDate: new Date().toISOString().split('T')[0], mode:'Telephonic', personName:'', contactNumber:'', rating: 5 });
            const [selectedCompCust, setSelectedCompCust] = useState('');
            const [newComp, setNewComp] = useState({ truckId:'', category:'', description:'', dateReceived: new Date().toISOString().split('T')[0], mode:'Mail', reportedBy:'' });
            const [closeData, setCloseData] = useState({ diagnosis:'', closedBy:'', closedDate: new Date().toISOString().split('T')[0], remarks:'' });

            // QR helper — encodes current page URL + PO hash
            const getQrData = useCallback((truck) => {
                let base = window.location.href.split('#')[0];
                // If running locally, fallback to the live GitHub Pages URL so QR codes scanned by mobile phones work!
                if (base.startsWith('file:') || base.includes('localhost') || base.includes('127.0.0.1')) {
                    base = 'https://riyazrthd.github.io/fireflow-warranty-/';
                }
                const url = `${base}#portal&po=${encodeURIComponent(truck.poNo)}`;
                return url;
            }, []);

            const getQrImageUrl = useCallback((truck) => {
                const data = encodeURIComponent(getQrData(truck));
                return `https://api.qrserver.com/v1/create-qr-code/?size=280x280&format=png&margin=16&color=1e293b&bgcolor=ffffff&data=${data}`;
            }, [getQrData]);

            // URL hash detection — auto-open portal if opened via QR or hash changes
            useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash;
                    if (hash.startsWith('#portal')) {
                        try {
                            const raw = hash.replace('#portal', '').replace(/^&/, '?');
                            const params = new URLSearchParams(raw);
                            const po = params.get('po');
                            if (po) { setPortalInitialPo(po); setViewMode('customer'); }
                        } catch(e) {}
                    }
                };
                handleHashChange();
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            // Persist to localStorage
            useEffect(() => {
                localStorage.setItem('ff_cust', JSON.stringify(customers));
                localStorage.setItem('ff_trks', JSON.stringify(trucks));
                localStorage.setItem('ff_cmps', JSON.stringify(complaints));
                localStorage.setItem('ff_fb', JSON.stringify(feedbacks));
                localStorage.setItem('ff_cats', JSON.stringify(categories));
            }, [customers, trucks, complaints, feedbacks, categories]);

            // Load from Supabase with Smart Sync
            useEffect(() => {
                const sb = window.SupabaseClient;
                if (!sb) { setLoading(false); return; }
                setUser({ connected: true });
                const fetchAll = async () => {
                    try {
                        const [custRes, trkRes, compRes, catRes, fbRes] = await Promise.all([
                            sb.from('customers').select('*'), sb.from('trucks').select('*'), sb.from('complaints').select('*'), sb.from('categories').select('name'), sb.from('feedbacks').select('*')
                        ]);

                        // Load local cache
                        const localCust = JSON.parse(localStorage.getItem('ff_cust') || '[]');
                        const localTrks = JSON.parse(localStorage.getItem('ff_trks') || '[]');
                        const localCmps = JSON.parse(localStorage.getItem('ff_cmps') || '[]');
                        const localFb = JSON.parse(localStorage.getItem('ff_fb') || '[]');

                        let dbCust = custRes.data ? custRes.data.map(mapCustomer) : [];
                        let dbTrks = trkRes.data ? trkRes.data.map(mapTruck) : [];
                        let dbCmps = compRes.data ? compRes.data.map(mapComplaint) : [];
                        let dbFb = fbRes.data ? fbRes.data.map(mapFeedback) : [];

                        // ── Sync Customers ──
                        const localOnlyCust = localCust.filter(lc => String(lc.id).startsWith('LOCAL-'));
                        for (const c of localOnlyCust) {
                            try {
                                const { data: ins, error } = await sb.from('customers').insert({ name: c.name, address: c.address, contact_person: c.contactPerson, phone: c.phone, email: c.email }).select().single();
                                if (ins) {
                                    const mapped = mapCustomer(ins);
                                    dbCust.push(mapped);
                                    localTrks.forEach(t => { if (t.customerId === c.id) t.customerId = mapped.id; });
                                } else {
                                    dbCust.push(c);
                                    if (error) setSyncErrors(prev => [...prev, { label: `Customer: ${c.name || 'N/A'}`, error: error.message }]);
                                }
                            } catch(err) {
                                dbCust.push(c);
                                setSyncErrors(prev => [...prev, { label: `Customer: ${c.name || 'N/A'}`, error: err.message || 'System error during sync' }]);
                            }
                        }

                        // ── Sync Trucks ──
                        const localOnlyTrks = localTrks.filter(lt => String(lt.id).startsWith('LOCAL-'));
                        for (const t of localOnlyTrks) {
                            try {
                                const payload = { customer_id: t.customerId, po_no: t.poNo, tender_type: t.tenderType, pump_make: t.pumpMake, pump_lpm: t.pumpLpm || null, pump_sr_no: t.pumpSrNo || null, foam_capacity: t.foamCapacity || null, water_capacity: t.waterCapacity || null, chassis_make: t.chassisMake, model_no: t.modelNo, delivery_date: t.deliveryDate || null, warranty_months: parseInt(t.warrantyMonths)||12, insurance_policy_no: t.insurancePolicyNo || null, insurance_company: t.insuranceCompany || null, insurance_expiry_date: t.insuranceExpiryDate || null };
                                let { data: ins, error } = await sb.from('trucks').insert(payload).select().single();
                                if (error && isMissingColumnError(error)) {
                                    const fallbackPayload = { ...payload };
                                    delete fallbackPayload.insurance_policy_no;
                                    delete fallbackPayload.insurance_company;
                                    delete fallbackPayload.insurance_expiry_date;
                                    delete fallbackPayload.pump_sr_no;
                                    const retry = await sb.from('trucks').insert(fallbackPayload).select().single();
                                    ins = retry.data;
                                    error = retry.error;
                                }
                                if (error) {
                                    console.error("Sync error for truck PO:", t.poNo, error);
                                    setSyncErrors(prev => [...prev, { label: `Delivery PO: ${t.poNo || 'N/A'}`, error: error.message }]);
                                }
                                if (ins) {
                                    const mapped = mapTruck(ins);
                                    // Preserve local insurance info if database dropped them
                                    const finalRecord = {
                                        ...mapped,
                                        insurancePolicyNo: mapped.insurancePolicyNo || t.insurancePolicyNo,
                                        insuranceCompany: mapped.insuranceCompany || t.insuranceCompany,
                                        insuranceExpiryDate: mapped.insuranceExpiryDate || t.insuranceExpiryDate,
                                        pumpSrNo: mapped.pumpSrNo || t.pumpSrNo
                                    };
                                    dbTrks.push(finalRecord);
                                    localCmps.forEach(comp => { if (comp.truckId === t.id) comp.truckId = finalRecord.id; });
                                } else {
                                    dbTrks.push(t);
                                }
                            } catch(err) {
                                console.error("Sync exception for truck PO:", t.poNo, err);
                                setSyncErrors(prev => [...prev, { label: `Delivery PO: ${t.poNo || 'N/A'}`, error: err.message || 'System error during sync' }]);
                                dbTrks.push(t);
                            }
                        }

                        // ── Sync Complaints ──
                        // A. Handle new local complaints
                        const localOnlyCmps = localCmps.filter(lc => String(lc.id).startsWith('LOCAL-'));
                        for (const c of localOnlyCmps) {
                            try {
                                const payload = { truck_id: c.truckId, complaint_id: c.complaintId, category: c.category, description: c.description, date_received: c.dateReceived, mode: c.mode||'Customer Portal', reported_by: c.reportedBy, status: c.status };
                                if (c.status === 'Resolved') {
                                    payload.diagnosis = c.diagnosis;
                                    payload.closed_by = c.closedBy;
                                    payload.closed_date = c.closedDate;
                                    payload.remarks = c.remarks;
                                    payload.resolved_at = c.resolvedAt || new Date().toISOString();
                                    payload.delay_reason = c.delayReason;
                                } else if (c.closedBy) {
                                    payload.closed_by = c.closedBy;
                                    payload.closed_date = c.closedDate;
                                    payload.delay_reason = c.delayReason;
                                }
                                let { data: ins, error } = await sb.from('complaints').insert(payload).select().single();
                                if (error && isMissingColumnError(error)) {
                                    const fallbackPayload = { ...payload };
                                    delete fallbackPayload.delay_reason;
                                    const retry = await sb.from('complaints').insert(fallbackPayload).select().single();
                                    ins = retry.data;
                                    error = retry.error;
                                }
                                if (ins) {
                                    dbCmps.push(mapComplaint(ins));
                                } else {
                                    dbCmps.push(c);
                                    if (error) setSyncErrors(prev => [...prev, { label: `Ticket: ${c.complaintId || 'N/A'}`, error: error.message }]);
                                }
                            } catch(err) {
                                dbCmps.push(c);
                                setSyncErrors(prev => [...prev, { label: `Ticket: ${c.complaintId || 'N/A'}`, error: err.message || 'System error during sync' }]);
                            }
