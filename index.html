                                <textarea className="w-full border rounded-xl p-3 text-sm min-h-[120px] outline-none focus:ring-2 focus:ring-rose-500" value={newComp.description} onChange={e=>setNewComp({...newComp,description:e.target.value})} required placeholder="Description..."/>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-500 uppercase">Mode</label><select className="w-full border rounded-xl p-3 text-sm" value={newComp.mode} onChange={e=>setNewComp({...newComp,mode:e.target.value})}><option>Mail</option><option>Telephone</option><option>In Person</option></select></div>
                                    <Input label="Date" type="date" value={newComp.dateReceived} onChange={v=>setNewComp({...newComp,dateReceived:v})} required/>
                                </div>
                                <Input label="Reported By" value={newComp.reportedBy} onChange={v=>setNewComp({...newComp,reportedBy:v})}/>
                                <button type="submit" className="w-full bg-rose-600 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-xl mt-2 tracking-widest hover:bg-rose-700">Generate Ticket</button>
                            </form>
                        </Modal>
                    )}

                    {showCategoryModal && (
                        <Modal title="Categories" onClose={()=>setShowCategoryModal(false)}>
                            <div className="space-y-4">
                                <div className="flex gap-2"><div className="flex-1"><Input label="New Category" value={newCat} onChange={setNewCat}/></div><button onClick={handleAddCategory} className="mt-5 bg-slate-900 text-white px-6 py-2.5 rounded-lg text-xs font-black uppercase hover:bg-black transition-all">Add</button></div>
                                <div className="space-y-2 border-t pt-4 max-h-60 overflow-y-auto">{categories.map((cat,idx)=>(
                                    <div key={idx} className="flex items-center justify-between p-3 bg-slate-50 rounded-xl border group">
                                        <span className="text-xs font-bold text-slate-700 uppercase">{cat}</span>
                                        <button onClick={()=>handleRemoveCategory(cat)} className="text-slate-300 hover:text-rose-600 opacity-0 group-hover:opacity-100 transition-all"><Icon name="trash-2" size={16}/></button>
                                    </div>
                                ))}</div>
                            </div>
                        </Modal>
                    )}

                    {showCloseModal && (
                        <Modal title={`Resolve: ${showCloseModal.complaintId}`} onClose={()=>setShowCloseModal(null)}>
                            <form onSubmit={async e=>{
                                e.preventDefault();
                                const upP={status:'Resolved',diagnosis:closeData.diagnosis,closed_by:closeData.closedBy,closed_date:closeData.closedDate,remarks:closeData.remarks,resolved_at:new Date().toISOString()};
                                const sb=window.SupabaseClient;
                                if(user&&sb&&!String(showCloseModal.id).startsWith('LOCAL')){
                                    try {
                                        const { error } = await sb.from('complaints').update(upP).eq('id',showCloseModal.id);
                                        if (error) console.error("Supabase close complaint error:", error);
                                    } catch(er) {
                                        console.error("Supabase close complaint exception:", er);
                                    }
                                }
                                setComplaints(prev=>prev.map(c=>c.id===showCloseModal.id?{...c,...upP,closedBy:closeData.closedBy,closedDate:closeData.closedDate,remarks:closeData.remarks}:c));
                                setShowCloseModal(null); setCloseData({diagnosis:'',closedBy:'',closedDate:new Date().toISOString().split('T')[0],remarks:''});
                            }} className="space-y-4">
                                {showCloseModal.closedBy && (
                                    <div className="p-3.5 bg-indigo-50 border border-indigo-100 rounded-2xl text-[10px] font-bold text-indigo-800 uppercase space-y-1">
                                        <p className="text-indigo-400 font-black tracking-widest flex items-center gap-1"><Icon name="user-check" size={12}/> Planned Assignment Reference</p>
                                        <p className="text-indigo-900 font-extrabold normal-case text-xs">
                                            Engineer: <span className="font-black uppercase">{showCloseModal.closedBy}</span> · Target Date: <span className="font-black">{formatDate(showCloseModal.closedDate)}</span>
                                        </p>
                                        {showCloseModal.delayReason && (
                                            <p className="text-amber-600 font-extrabold text-[10px] flex items-center gap-1 border-t border-indigo-100/50 pt-1 mt-1">
                                                <Icon name="alert-triangle" size={12}/> Reschedule Reason: <span className="text-slate-700 font-semibold normal-case italic">"{showCloseModal.delayReason}"</span>
                                            </p>
                                        )}
                                    </div>
                                )}
                                <div className="space-y-1"><label className="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Diagnosis / Fix Applied *</label><textarea className="w-full border rounded-xl p-3 text-sm min-h-[140px] outline-none focus:ring-2 focus:ring-emerald-500" value={closeData.diagnosis} onChange={e=>setCloseData({...closeData,diagnosis:e.target.value})} required placeholder="Describe the root cause and repair performed..."/></div>
                                <div className="grid grid-cols-2 gap-4"><Input label="Engineer Name" value={closeData.closedBy} onChange={v=>setCloseData({...closeData,closedBy:v})} required/><Input label="Close Date" type="date" value={closeData.closedDate} onChange={v=>setCloseData({...closeData,closedDate:v})} required/></div>
                                <div className="space-y-1"><label className="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Additional Notes</label><textarea className="w-full border rounded-xl p-3 text-sm min-h-[80px] outline-none focus:ring-2 focus:ring-emerald-500" value={closeData.remarks} onChange={e=>setCloseData({...closeData,remarks:e.target.value})} placeholder="Any follow-up advice, parts replaced, etc."/></div>
                                <button type="submit" className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-xl mt-2 tracking-widest hover:bg-emerald-700">Close Ticket</button>
                            </form>
                        </Modal>
                    )}

                    {showAssignModal && (
                        <Modal title={showAssignModal.closedBy ? `Reschedule / Update Assignment: ${showAssignModal.complaintId}` : `Assign Engineer: ${showAssignModal.complaintId}`} onClose={()=>{ setShowAssignModal(null); setAssignData({ closedBy: '', closedDate: new Date().toISOString().split('T')[0], delayReason: '' }); }}>
                            <form onSubmit={async e=>{
                                e.preventDefault();
                                const upP = {
                                    closed_by: assignData.closedBy,
                                    closed_date: assignData.closedDate,
                                    delay_reason: assignData.delayReason || null
                                };
                                const sb = window.SupabaseClient;
                                if (user && sb && !String(showAssignModal.id).startsWith('LOCAL')) {
                                    try {
                                        let { error } = await sb.from('complaints').update(upP).eq('id', showAssignModal.id);
                                        if (error && isMissingColumnError(error)) {
                                            const fallbackPayload = { ...upP };
                                            delete fallbackPayload.delay_reason;
                                            const retry = await sb.from('complaints').update(fallbackPayload).eq('id', showAssignModal.id);
                                            error = retry.error;
                                        }
                                        if (error) console.error("Supabase assign complaint error:", error);
                                    } catch(er) {
                                        console.error("Supabase assign complaint exception:", er);
                                    }
                                }
                                setComplaints(prev => prev.map(c => c.id === showAssignModal.id ? { ...c, ...upP, closedBy: assignData.closedBy, closedDate: assignData.closedDate, delayReason: assignData.delayReason } : c));
                                setShowAssignModal(null);
                                setAssignData({ closedBy: '', closedDate: new Date().toISOString().split('T')[0], delayReason: '' });
                            }} className="space-y-4">
                                {showAssignModal.closedBy && (
                                    <div className="p-3.5 bg-slate-50 border rounded-2xl text-[10px] font-bold text-slate-500 uppercase space-y-1">
                                        <p className="text-slate-400 font-black tracking-widest">Previous Assignment</p>
                                        <p className="text-slate-700 font-extrabold normal-case text-xs">Assigned to <span className="font-black uppercase">{showAssignModal.closedBy}</span> for <span className="font-black">{formatDate(showAssignModal.closedDate)}</span></p>
                                    </div>
                                )}
                                
                                {showAssignModal.closedDate && assignData.closedDate !== showAssignModal.closedDate && (
                                    <div className="p-3.5 bg-amber-50 border border-amber-200 rounded-2xl text-[10px] font-bold text-amber-800 flex items-start gap-2.5">
                                        <Icon name="alert-triangle" size={16} className="text-amber-600 shrink-0 mt-0.5"/>
                                        <div>
                                            <p className="font-black uppercase tracking-widest text-[9px] mb-1">⚠️ Rescheduling Target Date</p>
                                            <p className="normal-case font-bold text-[11px] leading-relaxed">The target date is being adjusted from {formatDate(showAssignModal.closedDate)} to {formatDate(assignData.closedDate)}. A delay reason is required to save this update.</p>
                                        </div>
                                    </div>
                                )}

                                <div className="grid grid-cols-2 gap-4">
                                    <Input label="Assign Engineer / Manpower *" value={assignData.closedBy} onChange={v=>setAssignData({...assignData,closedBy:v})} required/>
                                    <Input label="Target Visit Date *" type="date" value={assignData.closedDate} onChange={v=>setAssignData({...assignData,closedDate:v})} required/>
                                </div>

                                {showAssignModal.closedBy && (
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Delay / Reschedule Reason {showAssignModal.closedDate && assignData.closedDate !== showAssignModal.closedDate ? ' *' : ' (Optional)'}</label>
                                        <textarea value={assignData.delayReason} onChange={e=>setAssignData({...assignData, delayReason:e.target.value})} required={showAssignModal.closedDate && assignData.closedDate !== showAssignModal.closedDate} placeholder="Describe the reason for team/date adjustment..." className="w-full border rounded-xl p-3 text-sm min-h-[80px] outline-none focus:ring-2 focus:ring-indigo-500"/>
                                    </div>
                                )}

                                <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-xl mt-2 tracking-widest hover:bg-indigo-700">Save Assignment</button>
                            </form>
                        </Modal>
                    )}

                    {deleteStep && (
                        <Modal title="Confirm Deletion" onClose={()=>setDeleteStep(null)} maxW="max-w-md">
                            <div className="space-y-6">
                                <div className={`p-5 rounded-2xl border flex items-start gap-4 ${deleteStep.step===2?'bg-rose-50 border-rose-200 text-rose-800':'bg-amber-50 border-amber-200 text-amber-800'}`}>
                                    <div className={`p-3 text-white rounded-xl shrink-0 ${deleteStep.step===2?'bg-rose-600':'bg-amber-500'}`}><Icon name="alert-triangle" size={24}/></div>
                                    <div>
                                        <p className="font-black uppercase text-[10px] mb-2 tracking-widest">{deleteStep.step===1?'Warning':'⚠ Final Confirmation'}</p>
                                        <p className="text-sm font-bold leading-relaxed">{deleteStep.step===1?`Are you sure you want to remove this ${deleteStep.type}? This action cannot be undone.`:`CRITICAL: You are about to permanently delete this record from both the local data and the cloud database. Click "Delete Record" to proceed.`}</p>
                                    </div>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={()=>setDeleteStep(null)} className="flex-1 px-4 py-3.5 rounded-2xl bg-slate-100 text-slate-600 text-[10px] font-black uppercase tracking-widest hover:bg-slate-200 transition-all">Cancel</button>
                                    <button onClick={confirmDeletion} className={`flex-1 px-4 py-3.5 rounded-2xl text-white text-[10px] font-black uppercase tracking-widest shadow-xl transition-all ${deleteStep.step===2?'bg-rose-600 hover:bg-rose-700':'bg-amber-500 hover:bg-amber-600'}`}>{deleteStep.step===1?'Confirm Step 1 / 2':'Delete Record ✓'}</button>
                                </div>
                            </div>
                        </Modal>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App/>);
    </script>
</body>
</html>
