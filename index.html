                        }

                        // B. Handle local resolutions or assignments of existing DB complaints
                        for (const c of localCmps.filter(lc => !String(lc.id).startsWith('LOCAL-'))) {
                            const dbMatch = dbCmps.find(dc => dc.id === c.id);
                            if (dbMatch) {
                                if (c.status === 'Resolved' && dbMatch.status === 'Open') {
                                    try {
                                        const upP = { status: 'Resolved', diagnosis: c.diagnosis, closed_by: c.closedBy, closed_date: c.closedDate, remarks: c.remarks, resolved_at: c.resolvedAt || new Date().toISOString(), delay_reason: c.delayReason };
                                        let { error } = await sb.from('complaints').update(upP).eq('id', c.id);
                                        if (error && isMissingColumnError(error)) {
                                            const fallbackPayload = { ...upP };
                                            delete fallbackPayload.delay_reason;
                                            const retry = await sb.from('complaints').update(fallbackPayload).eq('id', c.id);
                                            error = retry.error;
                                        }
                                        if (!error) {
                                            dbCmps = dbCmps.map(item => item.id === c.id ? { ...item, ...upP, closedBy: c.closedBy, closedDate: c.closedDate, remarks: c.remarks, delayReason: c.delayReason } : item);
                                        } else {
                                            setSyncErrors(prev => [...prev, { label: `Ticket Update: ${c.complaintId || 'N/A'}`, error: error.message }]);
                                        }
                                    } catch(err) {
                                        setSyncErrors(prev => [...prev, { label: `Ticket Update: ${c.complaintId || 'N/A'}`, error: err.message || 'System error during sync' }]);
                                    }
                                } else if (c.status === 'Open' && (c.closedBy !== dbMatch.closedBy || c.closedDate !== dbMatch.closedDate || c.delayReason !== dbMatch.delayReason)) {
                                    try {
                                        const upP = { closed_by: c.closedBy, closed_date: c.closedDate, delay_reason: c.delayReason };
                                        let { error } = await sb.from('complaints').update(upP).eq('id', c.id);
                                        if (error && isMissingColumnError(error)) {
                                            const fallbackPayload = { ...upP };
                                            delete fallbackPayload.delay_reason;
                                            const retry = await sb.from('complaints').update(fallbackPayload).eq('id', c.id);
                                            error = retry.error;
                                        }
                                        if (!error) {
                                            dbCmps = dbCmps.map(item => item.id === c.id ? { ...item, ...upP, closedBy: c.closedBy, closedDate: c.closedDate, delayReason: c.delayReason } : item);
                                        } else {
                                            setSyncErrors(prev => [...prev, { label: `Ticket Assign: ${c.complaintId || 'N/A'}`, error: error.message }]);
                                        }
                                    } catch(err) {
                                        setSyncErrors(prev => [...prev, { label: `Ticket Assign: ${c.complaintId || 'N/A'}`, error: err.message || 'System error during sync' }]);
                                    }
                                }
                            }
                        }

                        // ── Sync Feedbacks (Reviews) ──
                        const localOnlyFb = localFb.filter(lf => String(lf.id).startsWith('LOCAL-'));
                        for (const f of localOnlyFb) {
                            try {
                                const payload = { customer_id: f.customerId, feedback_text: f.feedbackText, feedback_date: f.feedbackDate || null, person_name: f.personName, contact_number: f.contactNumber, mode: f.mode||'Customer Portal', rating: f.rating||5 };
                                let { data: ins, error } = await sb.from('feedbacks').insert(payload).select().single();
                                if (error && isMissingColumnError(error)) {
                                    const fallbackPayload = { ...payload };
                                    delete fallbackPayload.rating;
                                    const retry = await sb.from('feedbacks').insert(fallbackPayload).select().single();
                                    ins = retry.data;
                                    error = retry.error;
                                }
                                if (ins) {
                                    const mapped = mapFeedback(ins);
                                    dbFb.push({
                                        ...mapped,
                                        rating: mapped.rating || f.rating || 5
                                    });
                                } else {
                                    dbFb.push(f);
                                    if (error) setSyncErrors(prev => [...prev, { label: `Feedback Review`, error: error.message }]);
                                }
                            } catch(err) {
                                dbFb.push(f);
                                setSyncErrors(prev => [...prev, { label: `Feedback Review`, error: err.message || 'System error during sync' }]);
                            }
                        }

                        // Merge local cache insurance info if missing in DB
                        dbTrks = dbTrks.map(dt => {
                            const localMatch = localTrks.find(lt => lt.poNo === dt.poNo);
                            if (localMatch) {
                                return {
                                    ...dt,
                                    insurancePolicyNo: dt.insurancePolicyNo || localMatch.insurancePolicyNo,
                                    insuranceCompany: dt.insuranceCompany || localMatch.insuranceCompany,
                                    insuranceExpiryDate: dt.insuranceExpiryDate || localMatch.insuranceExpiryDate,
                                    pumpSrNo: dt.pumpSrNo || localMatch.pumpSrNo
                                };
                            }
                            return dt;
                        });

                        setCustomers(dbCust);
                        setTrucks(dbTrks);
                        setComplaints(dbCmps);
                        setFeedbacks(dbFb);
                        if (catRes.data?.length > 0) setCategories(catRes.data.map(c => c.name));

                    } catch(e) {
                        console.error("DB fallback to local data", e);
                        const localCust = JSON.parse(localStorage.getItem('ff_cust') || '[]');
                        const localTrks = JSON.parse(localStorage.getItem('ff_trks') || '[]');
                        const localCmps = JSON.parse(localStorage.getItem('ff_cmps') || '[]');
                        const localFb = JSON.parse(localStorage.getItem('ff_fb') || '[]');
                        setCustomers(localCust);
                        setTrucks(localTrks);
                        setComplaints(localCmps);
                        setFeedbacks(localFb);
                    }
                    finally { setLoading(false); }
                };
                fetchAll();
            }, []);

            // Refs to access latest state from subscription closure
            const trucksRef = useRef(trucks);
            const customersRef = useRef(customers);
            const viewModeRef = useRef(viewMode);

            useEffect(() => {
                trucksRef.current = trucks;
                customersRef.current = customers;
                viewModeRef.current = viewMode;
            }, [trucks, customers, viewMode]);

            // Real-time subscription to complaints table
            useEffect(() => {
                const sb = window.SupabaseClient;
                if (!sb) return;

                const channel = sb.channel('complaints-realtime')
                    .on(
                        'postgres_changes',
                        { event: 'INSERT', schema: 'public', table: 'complaints' },
                        (payload) => {
                            const newCompRec = mapComplaint(payload.new);
                            
                            // Add complaint to state (ignore if already added locally)
                            setComplaints(prev => {
                                if (prev.some(c => c.id === newCompRec.id || c.complaintId === newCompRec.complaintId)) {
                                    return prev;
                                }
                                return [newCompRec, ...prev];
                            });

                            // If we are currently in admin view, show alert & sound
                            if (viewModeRef.current === 'admin') {
                                const trk = trucksRef.current.find(t => t.id === newCompRec.truckId);
                                const cust = trk ? customersRef.current.find(c => c.id === trk.customerId) : null;
                                
                                const toastId = Date.now();
                                const newToast = {
                                    id: toastId,
                                    title: `New Complaint: ${newCompRec.complaintId}`,
                                    body: `${cust ? cust.name : 'Unknown Client'} · ${trk ? trk.tenderType : 'Fire Tender'} (${newCompRec.category})`,
                                    description: newCompRec.description,
                                    complaint: newCompRec
                                };

                                setNotifications(prev => [newToast, ...prev]);

                                // Auto dismiss toast after 8 seconds
                                setTimeout(() => {
                                    setNotifications(prev => prev.filter(n => n.id !== toastId));
                                }, 8000);

                                // Audio Alert (Web Audio API)
                                try {
                                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                                    const osc = audioCtx.createOscillator();
                                    const gain = audioCtx.createGain();
                                    osc.connect(gain);
                                    gain.connect(audioCtx.destination);
                                    osc.type = 'sine';
                                    osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5
                                    osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1); // A5
                                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.45);
                                    osc.start(audioCtx.currentTime);
                                    osc.stop(audioCtx.currentTime + 0.45);
                                } catch (err) {}
                            }
                        }
                    )
                    .subscribe();

                return () => {
                    sb.removeChannel(channel);
                };
            }, []);

            // ── Computed ──
            const activeUnits = useMemo(() => trucks.filter(t => calculateDaysRemaining(calculateWarrantyExpiry(t.deliveryDate, t.warrantyMonths)) > 0), [trucks]);

                <div className="min-h-screen flex items-center justify-center bg-slate-50">
                    <div className="text-center">
                        <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest">Connecting to server...</p>
                    </div>
                </div>
            );

            // ── CUSTOMER PORTAL ──
            if (viewMode === 'customer') return (
                <div className="min-h-screen relative">
                    {/* Hidden admin lock — bottom right, barely visible */}
                    <button
                        onClick={()=>{setPinInput('');setPinError(false);setShowAdminPin(true);}}
                        title=""
                        className="fixed bottom-4 right-4 z-50 w-7 h-7 rounded-full flex items-center justify-center opacity-10 hover:opacity-30 transition-opacity duration-300"
                        style={{background:'transparent'}}
                    >
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748b" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </button>

                    {/* PIN Modal */}
                    {showAdminPin && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-xs p-8 modal-animate text-center border border-slate-200">
                                <div className="w-14 h-14 bg-slate-900 rounded-2xl flex items-center justify-center mx-auto mb-5">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                </div>
                                <h3 className="font-black text-slate-900 uppercase tracking-tight mb-1">Admin Access</h3>
                                <p className="text-[11px] font-bold text-slate-400 mb-6 uppercase tracking-widest">Enter 4-digit PIN to continue</p>
                                {/* PIN dots display */}
                                <div className="flex justify-center gap-3 mb-6">
                                    {[0,1,2,3].map(i=>(
                                        <div key={i} className={`w-4 h-4 rounded-full border-2 transition-all ${pinInput.length>i?'bg-slate-900 border-slate-900':'bg-white border-slate-300'}`}/>
                                    ))}
                                </div>
                                {pinError && <p className="text-rose-500 text-[10px] font-black uppercase tracking-widest mb-4 animate-pulse">Incorrect PIN</p>}
                                {/* Numpad */}
                                <div className="grid grid-cols-3 gap-2 mb-4">
                                    {['1','2','3','4','5','6','7','8','9','','0','⌫'].map((k,i)=>(
                                        <button key={i} onClick={()=>{
                                            if(k==='') return;
                                            if(k==='⌫'){ setPinInput(p=>p.slice(0,-1)); setPinError(false); return; }
                                            const next = pinInput.length < 4 ? pinInput+k : pinInput;
                                            setPinInput(next);
                                            setPinError(false);
                                            if(next.length===4){
                                                if(next===ADMIN_PIN){ setViewMode('admin'); setPortalInitialPo(''); setShowAdminPin(false); setPinInput(''); }
                                                else { setPinError(true); setTimeout(()=>setPinInput(''),600); }
                                            }
                                        }} disabled={k===''}
                                        className={`h-12 rounded-2xl font-black text-lg transition-all
                                            ${k==='' ? 'invisible' :
                                            k==='⌫' ? 'bg-slate-100 text-slate-500 hover:bg-slate-200 text-sm' :
                                            'bg-slate-50 text-slate-900 hover:bg-indigo-50 hover:text-indigo-700 border border-slate-100 hover:border-indigo-200 active:scale-95'}`}>
                                            {k}
                                        </button>
                                    ))}
                                </div>
                                <button onClick={()=>{setShowAdminPin(false);setPinInput('');setPinError(false);}} className="text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-slate-600 transition-colors">Cancel</button>
                            </div>
                        </div>
                    )}

                    <CustomerPortal trucks={trucks} customers={customers} complaints={complaints} categories={categories} setComplaints={setComplaints} feedbacks={feedbacks} setFeedbacks={setFeedbacks} user={user} initialPo={portalInitialPo} getQrImageUrl={getQrImageUrl}/>
                </div>
            );

            // ── ADMIN PANEL ──
            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-slate-50 relative">
                    {/* Floating Toast Notifications */}
                    <div className="fixed top-4 right-4 z-[100] w-full max-w-sm space-y-3 pointer-events-none">
                        {notifications.map(n => (
                            <div key={n.id} className="pointer-events-auto bg-white/95 backdrop-blur-md border-l-4 border-red-600 rounded-2xl shadow-2xl p-4 flex gap-3 slide-in-right border border-slate-200/50">
                                <div className="p-2 bg-red-50 text-red-600 rounded-xl self-start">
                                    <Icon name="bell-ring" size={18}/>
                                </div>
                                <div className="flex-1 min-w-0">
                                    <p className="text-xs font-black text-slate-900 uppercase tracking-tight">{n.title}</p>
                                    <p className="text-[11px] font-bold text-slate-600 mt-0.5 leading-tight">{n.body}</p>
                                    <p className="text-[10px] text-slate-400 mt-1 italic truncate font-medium">"{n.description}"</p>
                                    <div className="flex gap-2 mt-2">
                                        <button onClick={() => {
                                            setActiveTab('complaints');
                                            setCompSearch(n.complaint.complaintId);
                                            setNotifications(prev => prev.filter(x => x.id !== n.id));
                                        }} className="bg-red-600 hover:bg-red-700 text-white text-[9px] font-black px-2.5 py-1 rounded-lg uppercase tracking-wider transition-all">
                                            View
                                        </button>
                                        <button onClick={() => setNotifications(prev => prev.filter(x => x.id !== n.id))} className="bg-slate-100 hover:bg-slate-200 text-slate-500 text-[9px] font-black px-2.5 py-1 rounded-lg uppercase tracking-wider transition-all">
                                            Dismiss
                                        </button>
                                    </div>
                                </div>
                                <button onClick={() => setNotifications(prev => prev.filter(x => x.id !== n.id))} className="text-slate-400 hover:text-slate-600 text-sm leading-none self-start">&times;</button>
                            </div>
                        ))}
                    </div>

                    {/* Sidebar */}
                    <aside className="w-full md:w-60 bg-slate-900 text-white p-6 flex flex-col border-r border-slate-800">
                        <div className="flex items-center gap-3 mb-8">
                            <div className="bg-red-600 p-2 rounded-xl shadow-lg shadow-red-500/20"><Icon name="truck" size={18}/></div>
                            <span className="font-black text-lg tracking-tighter uppercase">FireFlow</span>
                        </div>
                        <nav className="space-y-1 flex-1 overflow-y-auto min-h-0">
                            {[
                                {id:'dashboard',icon:'layout-grid',label:'Dashboard'},
                                {id:'customers',icon:'users',label:'Customers'},
                                {id:'trucks',icon:'shield-check',label:'Fire Tenders'},
                                {id:'complaints',icon:'alert-circle',label:'Complaints'},
                                {id:'feedback',icon:'star',label:'Reviews'}
                            ].map(item => (
                                <button key={item.id} onClick={()=>setActiveTab(item.id)} className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-bold transition-all ${activeTab===item.id?'bg-red-600 shadow-lg text-white':'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                                    <Icon name={item.icon} size={16}/>{item.label}
                                    {item.id==='complaints' && complaints.filter(c=>c.status==='Open').length>0 && <span className="ml-auto bg-rose-500 text-white text-[9px] font-black px-1.5 py-0.5 rounded-full">{complaints.filter(c=>c.status==='Open').length}</span>}
                                </button>
                            ))}
                        </nav>
                        {/* Customer Portal Switch */}
                        <div className="pt-4 mt-4 border-t border-white/10 space-y-2">
                            <button onClick={()=>setViewMode('customer')} className="w-full flex items-center gap-3 px-4 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-xl text-[11px] font-black uppercase tracking-wide text-white shadow-lg hover:shadow-indigo-500/30 transition-all">
                                <Icon name="users-2" size={14}/>Customer Portal
                            </button>
                            <button onClick={()=>setShowCategoryModal(true)} className="w-full flex items-center gap-3 px-4 py-2 text-[9px] font-black text-slate-400 hover:text-white uppercase tracking-widest transition-colors">
                                <Icon name="settings" size={12}/> Categories
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 p-4 md:p-6 overflow-y-auto h-screen">
                        <header className="mb-4 flex justify-between items-center">
                            <h1 className="text-xl font-black text-slate-900 capitalize tracking-tight">
                                {activeTab==='trucks'?'Fleet Inventory':activeTab==='feedback'?'Feedback Reviews':activeTab}
                            </h1>
                            <div className="flex items-center gap-2">
                                <div className="flex items-center gap-2 px-3 py-1.5 bg-white border rounded-xl shadow-sm">
                                    <div className={`w-2 h-2 rounded-full ${user?'bg-emerald-500 animate-pulse':'bg-slate-300'}`}></div>
                                    <span className="text-[10px] font-black text-slate-500 uppercase">{user?'Live Connection':'Local Mode'}</span>
                                </div>
                            </div>
                        </header>

                        {/* ── DASHBOARD ── */}
                        {activeTab==='dashboard' && (
                            <div className="space-y-4">
                                {syncErrors.length > 0 && (
                                    <div className="bg-rose-50 border border-rose-200 rounded-3xl p-5 space-y-3 fade-up">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-xl bg-rose-500 flex items-center justify-center text-white">
                                                <Icon name="alert-triangle" size={20}/>
                                            </div>
                                            <div>
                                                <p className="font-black text-rose-950 uppercase text-xs tracking-wider">Database Sync Warnings</p>
                                                <p className="text-[11px] font-bold text-rose-700 mt-0.5">Some local records could not be pushed to Supabase due to key constraints or missing data:</p>
                                            </div>
                                        </div>
                                        <div className="max-h-32 overflow-y-auto divide-y divide-rose-100 bg-white/80 rounded-2xl border border-rose-150 p-4 text-[11px] font-bold text-slate-700">
                                            {syncErrors.map((err, idx) => (
                                                <div key={idx} className="py-2.5 first:pt-0 last:pb-0 flex justify-between items-start gap-4">
                                                    <span className="text-slate-900 uppercase font-black">{err.label}</span>
                                                    <span className="text-rose-600 text-right font-medium">{err.error}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                    {[
                                        {l:'Clients',v:customers.length,c:'text-blue-600',icon:'building-2',bg:'bg-blue-50'},
                                        {l:'Live Warranty',v:activeUnits.length,c:'text-emerald-600',icon:'shield-check',bg:'bg-emerald-50'},
                                        {l:'Open Support',v:complaints.filter(c=>c.status==='Open').length,c:'text-rose-600',icon:'alert-circle',bg:'bg-rose-50'},
                                        {l:'Total Fleet',v:trucks.length,c:'text-slate-600',icon:'truck',bg:'bg-slate-50'}
                                    ].map((s,i)=>(
                                        <div key={i} className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4 hover:border-indigo-200 transition-all hover:shadow-md">
                                            <div className={`w-12 h-12 ${s.bg} rounded-xl flex items-center justify-center ${s.c}`}><Icon name={s.icon} size={20}/></div>
                                            <div><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">{s.l}</p><p className={`text-2xl font-black ${s.c}`}>{s.v}</p></div>
                                        </div>
                                    ))}
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                    <ComplaintTrendChart complaints={complaints} range={analyticsRange}/>
                                    <ComplaintCategoryChart complaints={complaints} range={analyticsRange}/>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                                    <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm h-[300px] flex flex-col">
                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="font-black text-slate-900 text-[11px] uppercase flex items-center gap-2"><Icon name="clock" size={14} className="text-amber-500"/>Warranty Expiry</h3>
                                            <div className="flex items-center gap-1 bg-slate-50 px-2 py-1 rounded-lg border border-slate-200">
                                                <input type="number" value={expiryDays} onChange={e=>setExpiryDays(e.target.value)} className="w-8 bg-transparent text-[10px] font-black text-slate-700 outline-none text-center"/>
                                                <span className="text-[8px] font-black text-slate-400 uppercase">Days</span>
                                            </div>
                                        </div>
                                        <div className="space-y-2 flex-1 min-h-0 overflow-y-auto pr-1">
                                            {expiringSoon.length===0 ? <div className="flex flex-col items-center justify-center h-full opacity-30 gap-2"><Icon name="check-circle" size={24}/><p className="text-[10px] font-black uppercase">No Expiries Soon</p></div> : expiringSoon.map(t=>{
                                                const exp=calculateWarrantyExpiry(t.deliveryDate,t.warrantyMonths); const d=calculateDaysRemaining(exp);
                                                return <div key={t.id} className="p-3 bg-slate-50 rounded-xl border hover:bg-white hover:shadow-sm transition-all border-slate-100">
                                                    <div className="flex justify-between items-start mb-0.5"><p className="text-[9px] font-black text-blue-600 uppercase">PO: {t.poNo||'N/A'}</p><span className={`text-[9px] font-black uppercase ${d<30?'text-rose-600':'text-amber-600'}`}>{d}d</span></div>
                                                    <p className="text-[10px] font-black text-slate-800 uppercase truncate">{t.tenderType}</p>
                                                    <p className="text-[8px] text-slate-400 font-bold uppercase truncate">{customers.find(c=>c.id===t.customerId)?.name}</p>
                                                </div>;
                                            })}
                                        </div>
                                    </div>
                                    <div className="lg:col-span-2 bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex flex-col h-[300px]">
                                        <h3 className="font-black text-slate-900 text-[11px] mb-4 uppercase flex items-center gap-2"><Icon name="alert-circle" size={14} className="text-rose-500"/>Active Support Queue</h3>
                                        <div className="flex-1 min-h-0 overflow-y-auto overflow-x-auto">
                                            <table className="w-full text-left">
                                                <thead className="bg-slate-50 text-[9px] font-black text-slate-400 uppercase tracking-widest sticky top-0 z-10 border-b"><tr><th className="px-3 py-3">Ticket</th><th className="px-3 py-3">Customer</th><th className="px-3 py-3">Source</th><th className="px-3 py-3 text-center">Age</th><th className="px-3 py-3 text-right">Status</th></tr></thead>
                                                <tbody className="divide-y divide-slate-50">
                                                    {complaints.filter(c=>c.status==='Open').map(c=>{
                                                        const trk=trucks.find(t=>t.id===c.truckId); const cust=customers.find(cu=>cu.id===trk?.customerId);
                                                        return <tr key={c.id} className="hover:bg-rose-50/20 transition-colors">
                                                            <td className="px-3 py-3"><p className="text-[10px] font-black text-slate-800 uppercase">{c.complaintId}</p><p className="text-[8px] text-rose-500 font-bold uppercase truncate max-w-[100px]">{c.category}</p></td>
                                                            <td className="px-3 py-3"><p className="text-[10px] font-bold text-slate-600 uppercase truncate max-w-[120px]">{cust?.name||'Unknown'}</p></td>
                                                            <td className="px-3 py-3"><Badge color={c.mode==='Customer Portal'?'indigo':'gray'}>{c.mode||'Admin'}</Badge></td>
                                                            <td className="px-3 py-3 text-center"><span className="text-rose-600 text-[10px] font-black">{calculateLifeCount(c.dateReceived)}d</span></td>
                                                            <td className="px-3 py-3 text-right"><Badge color="red">Open</Badge></td>
                                                        </tr>;
                                                    })}
                                                </tbody>
                                            </table>
                                            {complaints.filter(c=>c.status==='Open').length===0 && <div className="flex flex-col items-center justify-center h-32 opacity-30 gap-2"><Icon name="inbox" size={24}/><p className="text-[10px] font-black uppercase">No Open Tickets</p></div>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ── CUSTOMERS ── */}
                        {activeTab==='customers' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center"><h2 className="text-lg font-black text-slate-900 uppercase">Directory</h2><button onClick={()=>{setEditingCustomer(null);setNewCust({name:'',address:'',contactPerson:'',phone:'',email:''});setShowCustomerModal(true);}} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-[11px] font-black shadow-xl uppercase tracking-widest flex items-center gap-1"><Icon name="plus" size={14}/>Register</button></div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">{customers.map(c=>(
                                    <div key={c.id} className="bg-white p-6 rounded-3xl border shadow-sm relative hover:border-indigo-200 hover:shadow-md transition-all">
                                        <div className="absolute top-6 right-6 flex gap-2">
                                            <button onClick={()=>{setEditingCustomer(c);setNewCust({...c});setShowCustomerModal(true);}} className="text-slate-400 hover:text-blue-600 p-1 rounded-lg hover:bg-blue-50 transition-all"><Icon name="pencil" size={16}/></button>
                                            <button onClick={()=>setDeleteStep({type:'customer',data:c,step:1})} className="text-slate-400 hover:text-rose-600 p-1 rounded-lg hover:bg-rose-50 transition-all"><Icon name="trash-2" size={16}/></button>
                                        </div>
                                        <div className="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center mb-4 text-indigo-400"><Icon name="building-2" size={20}/></div>
                                        <h4 className="font-black text-slate-900 mb-1 uppercase tracking-tight">{c.name}</h4>
                                        <p className="text-[10px] text-slate-400 font-bold mb-4 italic truncate">{c.address}</p>
                                        <div className="space-y-1.5 text-[11px] font-bold text-slate-500 uppercase">
                                            <p className="flex items-center gap-2"><Icon name="user" size={12}/>{c.contactPerson}</p>
                                            <p className="flex items-center gap-2"><Icon name="phone" size={12}/>{c.phone}</p>
                                            <p className="flex items-center gap-2"><Icon name="mail" size={12}/>{c.email}</p>
                                        </div>
                                        <div className="mt-4 pt-4 border-t border-slate-100 flex items-center justify-between">
                                            <span className="text-[9px] font-black text-slate-400 uppercase">{trucks.filter(t=>t.customerId===c.id).length} vehicle(s)</span>
                                            <Badge color={activeUnits.some(t=>t.customerId===c.id)?'green':'gray'}>{activeUnits.some(t=>t.customerId===c.id)?'In Warranty':'No Active Warranty'}</Badge>
                                        </div>
                                    </div>
                                ))}</div>
                                {customers.length===0 && <div className="py-20 text-center opacity-30"><Icon name="users" size={32} className="mx-auto mb-3"/><p className="text-[11px] font-black uppercase">No Customers Yet</p></div>}
                            </div>
                        )}

                        {/* ── TRUCKS ── */}
                        {activeTab==='trucks' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center"><h2 className="text-lg font-black text-slate-900 uppercase">Inventory</h2><button onClick={()=>{setEditingTruck(null);setNewTrk({customerId:'',poNo:'',tenderType:'',pumpMake:'',pumpLpm:'',pumpSrNo:'',foamCapacity:'',waterCapacity:'',chassisMake:'',modelNo:'',deliveryDate:'',warrantyMonths:12,insurancePolicyNo:'',insuranceCompany:'',insuranceExpiryDate:''});setShowTruckModal(true);}} className="bg-blue-600 text-white px-4 py-2 rounded-xl text-[11px] font-black shadow-xl uppercase tracking-widest">Add Delivery</button></div>
                                <div className="bg-white rounded-3xl border overflow-hidden shadow-sm">
                                    <table className="w-full text-left table-fixed">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b"><tr><th className="px-4 py-4 w-[26%]">PO / Vehicle</th><th className="px-4 py-4 w-[18%]">Pump</th><th className="px-4 py-4 w-[18%] text-center">Insurance</th><th className="px-4 py-4 w-[14%] text-center">Warranty</th><th className="px-4 py-4 w-[14%] text-center">Source</th><th className="px-4 py-4 w-[10%] text-right">Actions</th></tr></thead>
                                        <tbody className="divide-y divide-slate-50 text-[11px]">
                                            {trucks.map(t=>{
                                                const wExp=calculateWarrantyExpiry(t.deliveryDate,t.warrantyMonths); const wRem=calculateDaysRemaining(wExp); const iRem=calculateDaysRemaining(t.insuranceExpiryDate);
                                                return <tr key={t.id} className="hover:bg-slate-50/50 transition-colors">
                                                    <td className="px-4 py-4"><p className="font-black text-blue-600 uppercase mb-0.5">PO: {t.poNo||'N/A'}</p><p className="font-black text-slate-900 uppercase truncate">{t.tenderType}</p><p className="text-[9px] text-slate-400 font-bold uppercase truncate">{customers.find(c=>c.id===t.customerId)?.name}</p></td>
                                                    <td className="px-4 py-4"><p className="font-black text-slate-800 uppercase">{t.pumpMake}</p><p className="text-[9px] text-slate-400 font-bold uppercase">{t.pumpLpm} LPM</p></td>
                                                    <td className="px-4 py-4 text-center"><p className="font-black text-slate-800 uppercase truncate">{t.insuranceCompany||'N/A'}</p><span className={`px-2 py-0.5 rounded-full font-black text-[9px] inline-block mt-1 ${iRem>30?'bg-indigo-50 text-indigo-600':'bg-rose-50 text-rose-600'}`}>{iRem>0?`${iRem}d`:'EXP'}</span></td>
                                                    <td className="px-4 py-4 text-center"><Badge color={wRem>0?(wRem<60?'yellow':'green'):'red'}>{wRem>0?`${wRem}d`:'EXP'}</Badge></td>
                                                    <td className="px-4 py-4 text-center"><Badge color={complaints.some(c=>c.truckId===t.id&&c.mode==='Customer Portal')?'indigo':'gray'}>{complaints.some(c=>c.truckId===t.id&&c.mode==='Customer Portal')?'Portal':'Admin'}</Badge></td>
                                                    <td className="px-4 py-4 text-right"><div className="flex items-center justify-end gap-1">
                                                        <button title="View / Print QR Code" onClick={()=>{setQrTruck(t);setShowQrModal(true);}} className="text-slate-400 hover:text-purple-600 p-1.5 rounded-lg hover:bg-purple-50 transition-all"><Icon name="qr-code" size={14}/></button>
                                                        <button onClick={()=>setShowViewComplaintsModal({customerId:t.customerId,orgName:customers.find(c=>c.id===t.customerId)?.name||'Org'})} className="text-slate-400 hover:text-indigo-600 p-1.5 rounded-lg hover:bg-indigo-50 transition-all"><Icon name="history" size={14}/></button>
                                                        <button onClick={()=>{setEditingTruck(t);setNewTrk({...t});setShowTruckModal(true);}} className="text-slate-400 hover:text-blue-600 p-1.5 rounded-lg hover:bg-blue-50 transition-all"><Icon name="pencil" size={14}/></button>
                                                        <button onClick={()=>setDeleteStep({type:'tender',data:t,step:1})} className="text-slate-400 hover:text-rose-600 p-1.5 rounded-lg hover:bg-rose-50 transition-all"><Icon name="trash-2" size={14}/></button>
                                                    </div></td>
                                                </tr>;
                                            })}
                                        </tbody>
                                    </table>
                                    {trucks.length===0 && <div className="py-16 text-center opacity-30"><Icon name="truck" size={32} className="mx-auto mb-3"/><p className="text-[11px] font-black uppercase">No vehicles recorded</p></div>}
                                </div>
                            </div>
                        )}

                        {/* ── COMPLAINTS ── */}
                        {activeTab==='complaints' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center flex-wrap gap-3">
                                    <h2 className="text-lg font-black text-slate-900 uppercase tracking-tight">Complaint History</h2>
                                    <button onClick={()=>{setSelectedCompCust('');setShowComplaintModal(true);}} className="bg-rose-600 text-white px-6 py-3 rounded-2xl text-xs font-black shadow-xl hover:bg-rose-700 transition-all uppercase tracking-widest flex items-center gap-2"><Icon name="plus" size={14}/>Raise Ticket</button>
                                </div>
                                {/* Filters */}
                                <div className="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm space-y-4">
                                    <div className="flex items-center gap-2 mb-2"><Icon name="filter" size={16} className="text-slate-400"/><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Filters</span></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                        <div className="space-y-1"><label className="text-[9px] font-black text-slate-400 uppercase">Search</label><div className="relative"><input type="text" placeholder="Ticket ID or client..." value={compSearch} onChange={e=>setCompSearch(e.target.value)} className="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-100 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-rose-500 transition-all"/><div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="search" size={14}/></div></div></div>
                                        <div className="space-y-1"><label className="text-[9px] font-black text-slate-400 uppercase">Status</label><select value={compStatus} onChange={e=>setCompStatus(e.target.value)} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-100 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-rose-500 appearance-none cursor-pointer"><option value="All">All Statuses</option><option value="Open">Open</option><option value="Resolved">Resolved</option></select></div>
                                        <div className="space-y-1"><label className="text-[9px] font-black text-slate-400 uppercase">Category</label><select value={compCat} onChange={e=>setCompCat(e.target.value)} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-100 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-rose-500 appearance-none cursor-pointer"><option value="All">All Categories</option>{categories.map((c,i)=><option key={i} value={c}>{c}</option>)}</select></div>
                                        <div className="space-y-1"><label className="text-[9px] font-black text-slate-400 uppercase">Date</label><div className="flex gap-2"><input type="date" value={compDate} onChange={e=>setCompDate(e.target.value)} className="flex-1 px-4 py-2 bg-slate-50 border border-slate-100 rounded-xl text-sm font-bold outline-none"/>{(compSearch||compStatus!=='All'||compCat!=='All'||compDate)&&<button onClick={()=>{setCompSearch('');setCompStatus('All');setCompCat('All');setCompDate('');}} className="p-2 bg-slate-100 text-slate-400 hover:text-rose-600 rounded-xl transition-colors"><Icon name="x-circle" size={20}/></button>}</div></div>
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    {filteredComplaints.map(c=>{
                                        const trk=trucks.find(t=>t.id===c.truckId); const cust=customers.find(cu=>cu.id===trk?.customerId);
                                        return <div key={c.id} className="bg-white p-6 rounded-3xl border shadow-sm relative group hover:border-slate-300 transition-all">
                                            <div className="absolute top-6 right-6 flex gap-2">
                                                <button onClick={()=>setDeleteStep({type:'complaint',data:c,step:1})} className="text-slate-400 hover:text-rose-600 p-1.5 rounded-lg hover:bg-rose-50 transition-all opacity-0 group-hover:opacity-100"><Icon name="trash-2" size={16}/></button>
                                            </div>
                                            <div className="flex items-start gap-6">
                                                <div className={`p-4 rounded-2xl shrink-0 ${c.status==='Resolved'?'bg-emerald-50 text-emerald-600':'bg-rose-50 text-rose-600'}`}><Icon name={c.status==='Resolved'?'check-circle':'alert-circle'} size={24}/></div>
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex items-center gap-3 mb-2 flex-wrap">
                                                        <span className="text-base font-black tracking-tighter uppercase text-slate-800">{c.complaintId}</span>
                                                        <Badge color={c.status==='Resolved'?'green':'red'}>{c.status}</Badge>
                                                        <span className="text-[10px] font-black text-slate-400 bg-slate-50 px-2 py-0.5 rounded-lg border uppercase tracking-widest">{c.category}</span>
                                                        {c.mode==='Customer Portal' && <Badge color="indigo">Customer Portal</Badge>}
                                                    </div>
                                                    <p className="text-xs font-bold text-slate-600 mb-4 leading-relaxed max-w-4xl">{c.description}</p>
                                                    {c.status==='Resolved' && (
                                                        <div className="p-4 bg-slate-50/50 rounded-2xl border border-slate-100 mb-4 text-[10px] font-bold text-slate-500 uppercase space-y-2">
                                                            <div className="flex justify-between items-center border-b border-slate-200 pb-1 mb-1">
                                                                <p className="text-emerald-600 font-black tracking-widest">Resolution Summary</p>
                                                                <button onClick={()=>downloadClosureReport(c)} className="bg-indigo-600 hover:bg-indigo-700 text-white text-[9px] font-black px-2 py-0.5 rounded-lg flex items-center gap-1 uppercase tracking-wider transition-all shadow-sm">
                                                                    <Icon name="file-text" size={10}/> Report PDF
                                                                </button>
                                                            </div>
                                                            <div className="grid grid-cols-2 gap-4"><p>Diagnosis: <span className="text-slate-800 font-black tracking-tight">{c.diagnosis || 'Diagnosis details not available.'}</span></p><p>Closed By: <span className="text-slate-800 font-black tracking-tight">{(c.closedBy && c.closedBy !== 'N/A') ? c.closedBy : 'Service Engineer'} ({formatDate((c.closedDate && c.closedDate !== 'N/A') ? c.closedDate : ((c.resolvedAt ? c.resolvedAt.split('T')[0] : null) || c.dateReceived))})</span></p></div>
                                                            {c.remarks && <p className="italic text-slate-400 border-t border-slate-100 pt-2">Notes: {c.remarks}</p>}
                                                        </div>
                                                    )}
                                                    {c.status==='Open' && c.closedBy && (
                                                        <div className="p-4 bg-indigo-50/30 rounded-2xl border border-indigo-100 mb-4 text-[10px] font-bold text-slate-500 uppercase space-y-2">
                                                            <div className="flex justify-between items-center border-b border-indigo-100 pb-1 mb-1">
                                                                <p className="text-indigo-600 font-black tracking-widest">Planned Visit & Manpower</p>
                                                            </div>
                                                            <div className="grid grid-cols-2 gap-4">
                                                                <p>Engineer: <span className="text-slate-800 font-black tracking-tight">{c.closedBy}</span></p>
                                                                <p>Target Date: <span className="text-slate-800 font-black tracking-tight">{formatDate(c.closedDate)}</span></p>
                                                            </div>
                                                            {c.delayReason && (
                                                                <p className="text-amber-600 font-extrabold border-t border-indigo-100/50 pt-2 flex items-center gap-1">
                                                                    <Icon name="alert-triangle" size={12}/> Rescheduled: <span className="text-slate-800 font-bold lowercase normal-case italic">"{c.delayReason}"</span>
                                                                </p>
                                                            )}
                                                        </div>
                                                    )}
                                                    <div className="flex gap-6 text-[9px] font-black text-slate-400 uppercase tracking-widest border-t border-slate-50 pt-3 flex-wrap">
                                                        <span className="flex items-center gap-1.5"><Icon name="truck" size={10}/>PO: {trk?.poNo||'N/A'} | {cust?.name}</span>
                                                        <span className="flex items-center gap-1.5"><Icon name="send" size={10}/>{c.mode||'Admin'}</span>
                                                        <span className="flex items-center gap-1.5"><Icon name="calendar" size={10}/>{formatDate(c.dateReceived)}</span>
                                                        <span className="flex items-center gap-1.5"><Icon name="clock" size={10}/>{calculateLifeCount(c.dateReceived)}d old</span>
                                                    </div>
                                                </div>
                                                {c.status==='Open' && (
                                                    <div className="flex gap-2 shrink-0">
                                                        <button onClick={()=>{
                                                            setAssignData({ closedBy: c.closedBy || '', closedDate: c.closedDate || new Date().toISOString().split('T')[0], delayReason: c.delayReason || '' });
                                                            setShowAssignModal(c);
                                                        }} className="border-2 border-indigo-200 text-indigo-700 px-4 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-indigo-50 transition-all flex items-center gap-1.5 shadow-sm">
                                                            <Icon name={c.closedBy ? "user-check" : "user-plus"} size={12}/> {c.closedBy ? "Reassign / Update" : "Assign Case"}
                                                        </button>
                                                        <button onClick={()=>{
                                                            setCloseData({ diagnosis: c.diagnosis || '', closedBy: c.closedBy || '', closedDate: new Date().toISOString().split('T')[0], remarks: c.remarks || '' });
                                                            setShowCloseModal(c);
                                                        }} className="bg-emerald-600 text-white px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-700 shadow-xl">
                                                            Resolve Case
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>;
                                    })}
                                    {filteredComplaints.length===0 && <div className="py-16 text-center opacity-30"><Icon name="inbox" size={32} className="mx-auto mb-3"/><p className="text-[11px] font-black uppercase">No complaints match current filters</p></div>}
                                </div>
                            </div>
                        )}

                        {/* ── FEEDBACK ── */}
                        {activeTab==='feedback' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center"><h2 className="text-lg font-black text-slate-900 uppercase tracking-tight">Customer Reviews</h2></div>
                                <div className="bg-white rounded-3xl border shadow-sm overflow-hidden overflow-x-auto">
                                    <table className="w-full text-left min-w-[800px]">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase border-b"><tr><th className="px-8 py-5">Client / Organization</th><th className="px-6 py-5">Primary Contact</th><th className="px-6 py-5">Feedback History</th><th className="px-8 py-5 text-right">Action</th></tr></thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {customers.map(cust=>{
                                                const cFbs=feedbacks.filter(f=>f.customerId===cust.id).sort((a,b)=>new Date(b.feedbackDate)-new Date(a.feedbackDate));
                                                const avgRating = cFbs.length>0 ? (cFbs.reduce((s,f)=>s+(f.rating||5),0)/cFbs.length).toFixed(1) : null;
                                                return <tr key={cust.id} className="hover:bg-slate-50/30 transition-colors">
                                                    <td className="px-8 py-5"><p className="text-sm font-black text-slate-900 uppercase">{cust.name}</p><p className="text-[10px] text-slate-400 font-bold">{cust.email}</p>{avgRating&&<div className="flex items-center gap-1 mt-1"><span className="text-amber-500">★</span><span className="text-[10px] font-black text-slate-700">{avgRating}</span><span className="text-[9px] text-slate-400">({cFbs.length})</span></div>}</td>
                                                    <td className="px-6 py-5"><p className="text-[11px] font-black text-slate-700 uppercase">{cust.contactPerson}</p><p className="text-[10px] text-slate-400 font-bold">{cust.phone}</p></td>
                                                    <td className="px-6 py-5 min-w-[300px]"><div className="max-h-[160px] overflow-y-auto pr-2 space-y-2">{cFbs.length>0?cFbs.map(fb=>(
                                                        <div key={fb.id} className="p-3 bg-slate-50 rounded-xl border border-slate-100 group relative">
                                                            <div className="flex justify-between items-start mb-1">
                                                                <div className="flex items-center gap-2"><span className="text-[9px] font-black text-slate-400">{formatDate(fb.feedbackDate)}</span>{fb.rating&&<div className="flex">{Array.from({length:5}).map((_,i)=><span key={i} className={i<fb.rating?'text-amber-400':'text-slate-200'} style={{fontSize:'9px'}}>★</span>)}</div>}</div>
                                                                <div className="flex gap-2 items-center"><Badge color={fb.mode==='Customer Portal'?'indigo':fb.mode==='Mail'?'blue':'gray'}>{fb.mode}</Badge><button onClick={()=>setDeleteStep({type:'feedback',data:fb,step:1})} className="text-slate-300 hover:text-rose-600 transition-opacity opacity-0 group-hover:opacity-100"><Icon name="trash-2" size={12}/></button></div>
                                                            </div>
                                                            <p className="text-[10px] font-bold text-slate-600">"{fb.feedbackText}"</p>
                                                            <p className="text-[9px] font-black text-slate-800 uppercase mt-1">— {fb.personName} ({fb.contactNumber})</p>
                                                        </div>
                                                    )):<p className="text-[10px] font-bold text-slate-300 uppercase italic">No reviews logged</p>}</div></td>
                                                    <td className="px-8 py-5 text-right"><button onClick={()=>setShowFeedbackModal(cust)} className="bg-indigo-600 text-white px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-indigo-700 shadow-lg shadow-indigo-500/20">Add Review</button></td>
                                                </tr>;
                                            })}
                                        </tbody>
                                    </table>
                                    {customers.length===0 && <div className="py-16 text-center opacity-30"><Icon name="star" size={32} className="mx-auto mb-3"/><p className="text-[11px] font-black uppercase">No registered customers</p></div>}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* ══ MODALS ══ */}

                    {showFeedbackModal && (
                        <Modal title={`Log Feedback: ${showFeedbackModal.name}`} onClose={()=>setShowFeedbackModal(null)}>
                            <form onSubmit={e=>{e.preventDefault();saveRecord('feedbacks',{...newFb,customerId:showFeedbackModal.id},setFeedbacks,setShowFeedbackModal,()=>setNewFb({feedbackText:'',feedbackDate:new Date().toISOString().split('T')[0],mode:'Telephonic',personName:'',contactNumber:'',rating:5}));}} className="space-y-4">
                                <div className="space-y-1.5">
                                    <label className="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest block">Rating</label>
                                    <StarRating value={newFb.rating||5} onChange={v=>setNewFb({...newFb,rating:v})}/>
                                </div>
                                <div className="space-y-1"><label className="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Feedback Description</label><textarea className="w-full border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none min-h-[100px]" value={newFb.feedbackText} onChange={e=>setNewFb({...newFb,feedbackText:e.target.value})} required placeholder="Observations..."/></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <Input label="Date" type="date" value={newFb.feedbackDate} onChange={v=>setNewFb({...newFb,feedbackDate:v})} required/>
                                    <div className="space-y-1"><label className="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Mode</label><select value={newFb.mode} onChange={e=>setNewFb({...newFb,mode:e.target.value})} className="w-full border border-slate-200 rounded-lg p-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-500"><option>Telephonic</option><option>Mail</option><option>In Person</option></select></div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <Input label="Person Name" value={newFb.personName} onChange={v=>setNewFb({...newFb,personName:v})} required/>
                                    <Input label="Contact Number" value={newFb.contactNumber} onChange={v=>setNewFb({...newFb,contactNumber:v})} required/>
                                </div>
                                <button type="submit" className="w-full bg-indigo-600 text-white py-3.5 rounded-2xl font-black text-xs uppercase shadow-xl tracking-widest hover:bg-indigo-700 transition-all">Submit Feedback</button>
                            </form>
                        </Modal>
                    )}

                    {showTruckModal && (
                        <Modal title={editingTruck?"Edit Delivery":"New Delivery"} onClose={()=>setShowTruckModal(false)}>
                            <form onSubmit={e=>{
                                e.preventDefault();
                                const captured = {...newTrk};
                                const isNew = !editingTruck;
                                const resetFn = () => {
                                    setNewTrk({customerId:'',poNo:'',tenderType:'',pumpMake:'',pumpLpm:'',pumpSrNo:'',foamCapacity:'',waterCapacity:'',chassisMake:'',modelNo:'',deliveryDate:'',warrantyMonths:12,insurancePolicyNo:'',insuranceCompany:'',insuranceExpiryDate:''});
                                    if (isNew && captured.poNo) { setQrTruck(captured); setShowQrModal(true); }
                                };
                                saveRecord('trucks',newTrk,setTrucks,setShowTruckModal,resetFn,editingTruck?.id);
                            }} className="space-y-4">
                                <SearchableSelect label="Client" options={customers} value={newTrk.customerId} onChange={v=>setNewTrk({...newTrk,customerId:v})} getOptionLabel={c=>c.name} getOptionValue={c=>c.id} required/>
                                <div className="grid grid-cols-2 gap-4"><Input label="PO Number" value={newTrk.poNo} onChange={v=>setNewTrk({...newTrk,poNo:v})} required/><Input label="Tender Type" value={newTrk.tenderType} onChange={v=>setNewTrk({...newTrk,tenderType:v})} required/></div>
                                <div className="grid grid-cols-2 gap-4"><Input label="Pump Make" value={newTrk.pumpMake} onChange={v=>setNewTrk({...newTrk,pumpMake:v})} required/><Input label="Pump Serial No" value={newTrk.pumpSrNo} onChange={v=>setNewTrk({...newTrk,pumpSrNo:v})}/></div>
                                <div className="grid grid-cols-2 gap-4"><Input label="LPM Capacity" value={newTrk.pumpLpm} onChange={v=>setNewTrk({...newTrk,pumpLpm:v})}/><Input label="Chassis Make" value={newTrk.chassisMake} onChange={v=>setNewTrk({...newTrk,chassisMake:v})}/></div>
                                <div className="grid grid-cols-2 gap-4"><Input label="Water Tank Capacity (Ltrs)" value={newTrk.waterCapacity} onChange={v=>setNewTrk({...newTrk,waterCapacity:v})}/><Input label="Foam Tank Capacity (Ltrs)" value={newTrk.foamCapacity} onChange={v=>setNewTrk({...newTrk,foamCapacity:v})}/></div>
                                <div className="grid grid-cols-2 gap-4"><Input label="Delivery Date" type="date" value={newTrk.deliveryDate} onChange={v=>setNewTrk({...newTrk,deliveryDate:v})} required/><Input label="Warranty Months" type="number" value={newTrk.warrantyMonths} onChange={v=>setNewTrk({...newTrk,warrantyMonths:v})}/></div>
                                <div className="grid grid-cols-2 gap-4"><Input label="Insurance Company" value={newTrk.insuranceCompany} onChange={v=>setNewTrk({...newTrk,insuranceCompany:v})}/><Input label="Insurance Expiry" type="date" value={newTrk.insuranceExpiryDate} onChange={v=>setNewTrk({...newTrk,insuranceExpiryDate:v})}/></div>
                                <button type="submit" className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-xl mt-2 tracking-widest hover:bg-blue-700">{editingTruck?'Update':'Save & Generate QR ▶'}</button>
                            </form>
                        </Modal>
                    )}

                    {/* ── QR CODE MODAL ── */}
                    {showQrModal && qrTruck && (() => {
                        const cust = customers.find(c=>c.id===qrTruck.customerId);
                        const wExp = calculateWarrantyExpiry(qrTruck.deliveryDate, qrTruck.warrantyMonths);
                        const qrImg = getQrImageUrl(qrTruck);
                        const qrLink = getQrData(qrTruck);
                        return (
                            <Modal title="QR Code — Warranty Support" onClose={()=>setShowQrModal(false)} maxW="max-w-lg">
                                <div className="text-center space-y-5">
                                    {/* QR Card — print-ready */}
                                    <div id="qr-print-card" className="bg-gradient-to-br from-slate-900 to-slate-800 rounded-2xl p-6 text-white mx-auto" style={{maxWidth:'340px'}}>
                                        <div className="flex items-center justify-between mb-4">
                                            <div className="text-left">
                                                <p className="text-[8px] font-black uppercase tracking-widest text-slate-400 mb-0.5">FireFlow Warranty</p>
                                                <p className="text-base font-black uppercase tracking-tight leading-tight">{qrTruck.tenderType||'Fire Tender'}</p>
                                                <p className="text-[10px] font-bold text-indigo-400 mt-0.5">PO: {qrTruck.poNo}</p>
                                            </div>
                                            <div className="bg-red-600 p-2 rounded-xl"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3"/><line x1="12" y1="17" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/></svg></div>
                                        </div>
                                        <div className="bg-white rounded-xl p-3 mx-auto inline-block">
                                            <img src={qrImg} alt="Warranty QR Code" width="200" height="200" className="block" style={{imageRendering:'pixelated'}}/>
                                        </div>
                                        <div className="mt-4 space-y-1 text-[9px] font-bold text-slate-400 uppercase tracking-wider">
                                            <p className="text-slate-200 font-black text-[11px]">📱 Scan to check warranty & log support</p>
                                            {cust && <p>{cust.name}</p>}
                                            {qrTruck.deliveryDate && <p>Delivered: {formatDate(qrTruck.deliveryDate)} · Warranty till: {formatDate(wExp)}</p>}
                                            {qrTruck.chassisMake && <p>Chassis: {qrTruck.chassisMake} · Pump: {qrTruck.pumpMake} {qrTruck.pumpLpm&&`(${qrTruck.pumpLpm} LPM)`}</p>}
                                        </div>
                                        <div className="mt-3 pt-3 border-t border-white/10 text-[8px] font-black text-slate-500 uppercase tracking-widest">
                                            Indus Fire Safety · Warranty Support Hub
                                        </div>
                                    </div>

                                    <p className="text-[11px] font-bold text-slate-500">Stick or hang this card on the vehicle. Customers scan to open the warranty portal directly for this tender.</p>

                                    {/* Action buttons */}
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={()=>{
                                            const w = window.open('','_blank');
                                            w.document.write(`<html><head><title>QR Code - ${qrTruck.poNo}</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:Inter,sans-serif;background:#f8fafc;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}@media print{body{background:white;padding:0;}}</style></head><body><div style="background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:20px;padding:32px;width:320px;color:white;text-align:center;"><div style="text-align:left;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;"><div><p style="font-size:8px;font-weight:900;color:#64748b;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;">FireFlow Warranty</p><p style="font-size:15px;font-weight:900;text-transform:uppercase;">${qrTruck.tenderType||'Fire Tender'}</p><p style="font-size:10px;color:#818cf8;margin-top:2px;">PO: ${qrTruck.poNo}</p></div></div><div style="background:white;border-radius:12px;padding:12px;display:inline-block;margin-bottom:16px;"><img src='${qrImg}' width='200' height='200' style='display:block;'/></div><p style="font-size:11px;font-weight:900;margin-bottom:8px;">📱 Scan to check warranty &amp; log support</p><p style="font-size:8px;color:#64748b;text-transform:uppercase;letter-spacing:1px;">${cust?.name||''} · Warranty till ${formatDate(wExp)}</p><p style="font-size:8px;color:#374151;margin-top:12px;text-transform:uppercase;letter-spacing:2px;">Indus Fire Safety · Warranty Support Hub</p></div></body></html>`);
                                            w.document.close();
                                            setTimeout(()=>w.print(), 800);
                                        }} className="flex items-center justify-center gap-2 bg-slate-900 text-white py-3 rounded-2xl font-black text-[11px] uppercase tracking-widest hover:bg-black transition-all">
                                            <Icon name="printer" size={14}/>Print Card
                                        </button>
                                        <a href={qrImg} download={`QR-${qrTruck.poNo}.png`} target="_blank" className="flex items-center justify-center gap-2 bg-indigo-600 text-white py-3 rounded-2xl font-black text-[11px] uppercase tracking-widest hover:bg-indigo-700 transition-all no-underline">
                                            <Icon name="download" size={14}/>Download PNG
                                        </a>
                                    </div>
                                    <button onClick={()=>{setPortalInitialPo(qrTruck.poNo);setViewMode('customer');setShowQrModal(false);}} className="w-full flex items-center justify-center gap-2 border-2 border-indigo-200 text-indigo-700 py-3 rounded-2xl font-black text-[11px] uppercase tracking-widest hover:bg-indigo-50 transition-all">
                                        <Icon name="external-link" size={14}/>Preview as Customer
                                    </button>
                                </div>
                            </Modal>
                        );
                    })()}

                    {showViewComplaintsModal && (
                        <Modal title={`History - ${showViewComplaintsModal.orgName}`} onClose={()=>setShowViewComplaintsModal(null)}>
                            <div className="space-y-4 max-h-[60vh] overflow-y-auto">
                                {complaints.filter(c=>trucks.find(t=>t.id===c.truckId)?.customerId===showViewComplaintsModal.customerId).length>0?(
                                    complaints.filter(c=>trucks.find(t=>t.id===c.truckId)?.customerId===showViewComplaintsModal.customerId).map(c=>(
                                        <div key={c.id} className="p-4 bg-slate-50 rounded-2xl border">
                                            <div className="flex items-center gap-3 mb-2"><span className="text-sm font-black text-slate-800">{c.complaintId}</span><Badge color={c.status==='Resolved'?'green':'red'}>{c.status}</Badge>{c.mode==='Customer Portal'&&<Badge color="indigo">Portal</Badge>}</div>
                                            <p className="text-xs font-bold text-slate-600 mb-2 leading-relaxed">{c.description}</p>
                                            <p className="text-[9px] font-black text-slate-400 uppercase">{formatDate(c.dateReceived)} | {c.category}</p>
                                        </div>
                                    ))
                                ):<div className="py-20 text-center opacity-30 text-[10px] font-black uppercase">No History</div>}
                            </div>
                        </Modal>
                    )}

                    {showCustomerModal && (
                        <Modal title={editingCustomer?"Edit Client":"Register Client"} onClose={()=>setShowCustomerModal(false)}>
                            <form onSubmit={e=>{e.preventDefault();saveRecord('customers',newCust,setCustomers,setShowCustomerModal,()=>setNewCust({name:'',address:'',contactPerson:'',phone:'',email:''}),editingCustomer?.id);}} className="space-y-4">
                                <Input label="Organization" value={newCust.name} onChange={v=>setNewCust({...newCust,name:v})} required/>
                                <Input label="Address" value={newCust.address} onChange={v=>setNewCust({...newCust,address:v})} required/>
                                <div className="grid grid-cols-2 gap-4"><Input label="Contact Person" value={newCust.contactPerson} onChange={v=>setNewCust({...newCust,contactPerson:v})} required/><Input label="Phone" value={newCust.phone} onChange={v=>setNewCust({...newCust,phone:v})} required/></div>
                                <Input label="Email" type="email" value={newCust.email} onChange={v=>setNewCust({...newCust,email:v})} required/>
                                <button type="submit" className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-xl hover:bg-black">Save</button>
                            </form>
                        </Modal>
                    )}

                    {showComplaintModal && (
                        <Modal title="Raise Complaint" onClose={()=>setShowComplaintModal(false)}>
                            <form onSubmit={e=>{
                                e.preventDefault();
                                const tender=trucks.find(t=>t.id===newComp.truckId); if(!tender)return;
                                const wExp=calculateWarrantyExpiry(tender.deliveryDate,tender.warrantyMonths); const dRem=calculateDaysRemaining(wExp); const sw=dRem>0?'IW':'OW';
                                const d=new Date(); const dd=d.getDate().toString().padStart(2,'0'); const mm=(d.getMonth()+1).toString().padStart(2,'0');
                                const genId=`${dd}${mm}-${sw}-${Math.floor(1000+Math.random()*9000)}`;
                                saveRecord('complaints',{...newComp,complaintId:genId,status:'Open'},setComplaints,setShowComplaintModal,()=>{setNewComp({truckId:'',category:'',description:'',dateReceived:new Date().toISOString().split('T')[0],mode:'Mail',reportedBy:''});setSelectedCompCust('');});
                            }} className="space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <SearchableSelect label="Client" options={customers} value={selectedCompCust} onChange={v=>setSelectedCompCust(v)} getOptionLabel={c=>c.name} getOptionValue={c=>c.id} required/>
                                    <SearchableSelect label="Vehicle" options={trucks.filter(t=>t.customerId===selectedCompCust)} value={newComp.truckId} onChange={v=>setNewComp({...newComp,truckId:v})} getOptionLabel={t=>`PO: ${t.poNo} - ${t.tenderType}`} getOptionValue={t=>t.id} disabled={!selectedCompCust} required/>
                                </div>
                                <select className="w-full border rounded-xl p-3 text-sm bg-white" value={newComp.category} onChange={e=>setNewComp({...newComp,category:e.target.value})} required><option value="">Select Category...</option>{categories.map((c,i)=><option key={i} value={c}>{c}</option>)}</select>
