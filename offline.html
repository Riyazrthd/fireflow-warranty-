<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireFlow - Offline</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            width: 90%;
        }
        h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
        p { color: #64748b; font-size: 0.95rem; margin-bottom: 2rem; line-height: 1.5; }
        .logo { width: 120px; margin-bottom: 1.5rem; }
        .btn {
            background-color: #0f172a;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #1e293b; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="FireFlow Logo" class="logo">
        <h1>You are Offline</h1>
        <p>It seems you've lost your internet connection. Don't worry, the app will automatically reconnect when you're back online.</p>
        <button class="btn" onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
